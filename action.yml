name: 'Install Claude Review Pipeline'
description: 'Copies review scripts into the workspace and exports CLAUDE_REVIEW_PIPELINE_DIR so the reusable workflow can read skills and agents directly from the action directory'
runs:
  using: composite
  steps:
    - name: Install pipeline files
      shell: bash
      run: |
        set -euo pipefail
        PIPELINE_DIR="${{ github.action_path }}"

        # Verify the action download is complete — catch a broken release here
        # instead of a cryptic "skill not found" mid-review.
        EXPECTED_SKILLS="review-context-builder review-orchestrator review-judge review-functional-tester"
        MISSING=""
        for s in $EXPECTED_SKILLS; do
          if [ ! -f "$PIPELINE_DIR/skills/${s}.md" ]; then
            MISSING="$MISSING skills/${s}.md"
          fi
        done
        if [ ! -f "$PIPELINE_DIR/agents/review-functional-tester.md" ]; then
          MISSING="$MISSING agents/review-functional-tester.md"
        fi
        if [ -n "$MISSING" ]; then
          echo "::error::panenco/claude-review install is incomplete — missing:$MISSING"
          echo "::error::Action download path: $PIPELINE_DIR"
          echo "::error::This indicates a broken release. Pin to a known-good SHA or open an issue on panenco/claude-review."
          ls -la "$PIPELINE_DIR/skills/" "$PIPELINE_DIR/agents/" 2>&1 || true
          exit 1
        fi
        for s in post-review.sh setup-dev-env.sh pick-oauth-token.sh review-plan.sh; do
          if [ ! -f "$PIPELINE_DIR/scripts/${s}" ]; then
            echo "::error::panenco/claude-review install is incomplete — missing script: ${s}"
            exit 1
          fi
        done

        # Export the action's directory so the reusable workflow can read
        # skills/ and agents/ directly from it. We do NOT copy them into the
        # workspace: claude-code-action restores `.claude/` for "untrusted"
        # PR heads, which would wipe anything placed there. The action dir
        # sits outside the workspace and survives the restore.
        echo "CLAUDE_REVIEW_PIPELINE_DIR=$PIPELINE_DIR" >> "$GITHUB_ENV"

        # Scripts go into the workspace because the reusable workflow invokes
        # them by path (`.review-scripts/foo.sh`).
        mkdir -p .review-scripts
        cp "$PIPELINE_DIR"/scripts/*.sh .review-scripts/
        chmod +x .review-scripts/*.sh
        echo "Pipeline dir: $PIPELINE_DIR"
        echo "Skills available: $(ls "$PIPELINE_DIR"/skills/review-*.md | wc -l) at $PIPELINE_DIR/skills"
        echo "Agents available: $(ls "$PIPELINE_DIR"/agents/*.md | wc -l) at $PIPELINE_DIR/agents"
        echo "Scripts installed: $(ls .review-scripts/*.sh | wc -l) at .review-scripts/"
