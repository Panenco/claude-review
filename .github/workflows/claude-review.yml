name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

# Cancel superseded review runs when a PR branch is repushed. Manual dispatch
# gets a per-invocation group so it never cancels concurrent PR runs.
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts to avoid burning review budget on in-progress work. The
    # pipeline still re-runs automatically on `ready_for_review`. Manual
    # dispatch is always allowed.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    # This repo IS panenco/claude-review, so the caller invokes its own
    # released v1 pipeline against itself. Pinning to @v1 (rather than the
    # in-PR copy at ./.github/workflows/pr-review.yml) is intentional: it
    # mirrors how every consumer repo uses the pipeline, so we dogfood the
    # same path our users hit. Trade-off: pipeline changes in this PR are
    # NOT exercised by this run — that's a separate concern handled at
    # tag-cut time.
    uses: panenco/claude-review/.github/workflows/pr-review.yml@v1
    permissions:
      contents: write
      pull-requests: write
      issues: write
    with:
      pr_number: ${{ inputs.pr_number || '' }}
    # `secrets: inherit` is the conventional form, but it failed on this repo
    # with `Secret CLAUDE_CODE_OAUTH_TOKEN is required, but not provided while
    # calling` even though the secret is set at the org level. The setup
    # recipe (`prompts/setup-review.md` Step 2) documents this fallback for
    # the same error: pass each secret explicitly. Likely an Actions quirk
    # with `inherit` on workflow_call across an `org/repo/...@tag` reference,
    # even within the same org.
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      CLAUDE_REVIEW_APP_CLIENT_ID: ${{ secrets.CLAUDE_REVIEW_APP_CLIENT_ID }}
      CLAUDE_REVIEW_APP_PRIVATE_KEY: ${{ secrets.CLAUDE_REVIEW_APP_PRIVATE_KEY }}
      CLAUDE_REVIEW_APP_SLUG: ${{ secrets.CLAUDE_REVIEW_APP_SLUG }}
      TRACKER_SECRETS: ${{ secrets.TRACKER_SECRETS }}
