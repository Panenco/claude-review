name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

# Cancel superseded review runs when a PR branch is repushed. Manual dispatch
# gets a per-invocation group so it never cancels concurrent PR runs.
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts to avoid burning review budget on in-progress work. The
    # pipeline still re-runs automatically on `ready_for_review`. Manual
    # dispatch is always allowed.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    # This repo IS panenco/claude-review, so we call the reusable workflow
    # via its local path rather than `panenco/claude-review/.github/workflows/
    # pr-review.yml@v2`. Two reasons:
    #   1. The `org/repo/...@tag` form trips a `startup_failure` here even
    #      with explicit secret mappings — the cross-repo treatment of
    #      same-repo reusable calls is the documented quirk in
    #      `prompts/setup-review.md` Step 2.
    #   2. The local path exercises the in-PR copy of pr-review.yml, which
    #      is a stronger dogfood: orchestration changes in a PR get tested
    #      on that PR's own review run. We extend that dogfood to skills
    #      + scripts via the `pipeline_ref:` input below.
    uses: ./.github/workflows/pr-review.yml
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read    # round-2 follow-up reviews need this to download
                       # the prior run's review-state artifact via run-id.
                       # Omitting this triggers startup_failure (caller perms
                       # cap the called workflow's perms — and the called
                       # workflow declares actions: read at job level).
    with:
      pr_number: ${{ inputs.pr_number || '' }}
      # Self-dogfood pin: install skills + scripts from THIS PR's head
      # commit, not from @v2. Without this, every PR on panenco/claude-review
      # tests its own pr-review.yml orchestration (because we use the local
      # path above) but installs skills/scripts from the last released v2 —
      # so script-level changes never get exercised until after merge. With
      # the pin, any change to scripts/ or skills/ is dogfooded on the very
      # PR introducing it. `head.sha` covers pull_request events; `github.sha`
      # is the fallback for `workflow_dispatch` (where head.sha is empty).
      pipeline_ref: ${{ github.event.pull_request.head.sha || github.sha }}
    secrets: inherit
