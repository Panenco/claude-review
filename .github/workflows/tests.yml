name: tests

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'skills/**'
      - 'agents/**'
      - 'tests/**'
      - '.github/workflows/tests.yml'

jobs:
  shell:
    name: Shell tests + lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install jq + shellcheck
        run: sudo apt-get install -y --no-install-recommends jq shellcheck

      - name: Run dev_env_secrets_test.sh
        run: bash tests/dev_env_secrets_test.sh

      - name: Run pick_oauth_token_test.sh
        run: bash tests/pick_oauth_token_test.sh

      - name: Run review_plan_test.sh
        run: bash tests/review_plan_test.sh

      - name: Run post_review_test.sh
        run: bash tests/post_review_test.sh

      - name: Shellcheck scripts (error-level only)
        run: shellcheck --severity=error scripts/*.sh tests/*.sh
