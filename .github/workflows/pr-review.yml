name: Claude PR Review

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number (auto-detected from PR event if omitted)'
        required: false
        type: string
      model_high:
        description: 'Model for deep-reasoning tasks (core reviewer)'
        required: false
        type: string
        default: 'claude-opus-4-7'
      model_standard:
        description: 'Model for standard tasks (context builder, sweep, functional tester)'
        required: false
        type: string
        default: 'claude-sonnet-4-6'
      model_fast:
        description: 'Cheap-tier model for mechanical roles (dedup only at present)'
        required: false
        type: string
        default: 'claude-haiku-4-5'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      CLAUDE_REVIEW_APP_CLIENT_ID:
        required: false
      CLAUDE_REVIEW_APP_PRIVATE_KEY:
        required: false
      CLAUDE_REVIEW_APP_SLUG:
        required: false
      TRACKER_SECRETS:
        required: false
        description: "Optional. Newline-separated KEY=VALUE pairs exposed as env vars to .github/claude-review/fetch-issue.sh. Populated from the caller repo's secret of the same name via `secrets: inherit`."

jobs:
  review:
    name: In-Depth Review
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write  # write needed for uploading screenshots to review-assets branch
      pull-requests: write
      issues: write
      actions: read    # needed for actions/download-artifact with run-id (round-2 state)

    steps:
      - name: Check OAuth token is configured
        shell: bash
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is not configured."
            echo "Run 'claude setup-token' locally against a Claude subscription"
            echo "and add the output as a repo secret named CLAUDE_CODE_OAUTH_TOKEN."
            exit 1
          fi

          # Log a stable fingerprint of the OAuth token so the user can tell
          # which token (and by proxy, which Claude account's quota) is in use.
          # SHA-256 first 12 hex chars: deterministic per token, leaks nothing.
          # When you rotate via `claude setup-token`, this fingerprint changes —
          # cross-check it against the value printed when you last ran setup-token.
          FINGERPRINT=$(printf '%s' "$CLAUDE_CODE_OAUTH_TOKEN" | shasum -a 256 | cut -c1-12)
          echo "Claude OAuth token fingerprint: $FINGERPRINT"
          echo "::notice title=Claude OAuth token::Token fingerprint $FINGERPRINT — if rate-limited, verify this matches the token."

      - name: Resolve PR head SHA
        # On `pull_request` events, github.event.pull_request.head.sha is set.
        # On `workflow_dispatch`, that field is empty and we'd otherwise fall
        # back to github.sha (the SHA of the manually-selected ref, NOT the
        # PR head — checkout would land on the wrong code). We resolve via
        # `gh pr view` to always get the actual PR head, regardless of trigger.
        id: pr_sha
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid,headRepositoryOwner,headRepository)
          SHA=$(jq -r '.headRefOid // empty' <<< "$PR_JSON")
          HEAD_OWNER=$(jq -r '.headRepositoryOwner.login // empty' <<< "$PR_JSON")
          HEAD_NAME=$(jq -r '.headRepository.name // empty' <<< "$PR_JSON")
          HEAD_REPO="$HEAD_OWNER/$HEAD_NAME"

          if [ -z "$SHA" ]; then
            echo "::error::Could not resolve PR head SHA for PR #$PR_NUMBER"
            exit 1
          fi

          # Fork-origin guard. The job-level `if:` catches fork PRs for the
          # `pull_request` event, but `workflow_dispatch` short-circuits that
          # guard (github.event.pull_request is null on dispatch, so the
          # head.repo check never runs). Re-verify here so a maintainer
          # dispatching against a fork-origin PR number can't trick the
          # workflow into checking out fork-controlled code with OAuth +
          # pull-requests:write in the environment.
          if [ "$HEAD_REPO" != "$GITHUB_REPOSITORY" ]; then
            echo "::error::PR #$PR_NUMBER head is in $HEAD_REPO, not $GITHUB_REPOSITORY. Fork PRs are not supported — the PR head must be in the same repository."
            exit 1
          fi

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$PR_NUMBER head SHA: $SHA (origin $HEAD_REPO)"

      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.pr_sha.outputs.sha }}
          fetch-depth: 50

      # Install review pipeline skills + scripts from the central repo.
      - name: Install review pipeline
        uses: panenco/claude-review@v1

      # Validate review-config.md sections (warn on missing recommended sections)
      # and sanity-check that file paths it references actually exist in the repo.
      # Catching these at validate-time produces a clean, actionable error
      # instead of letting the functional tester discover the mismatch mid-run.
      - name: Validate review config
        shell: bash
        run: |
          DEV_SCRIPT=".github/claude-review/dev-start.sh"
          CONFIG=".github/review-config.md"

          # dev-start.sh is the first-class contract for bringing up the
          # dev env. review-config.md is the second-class (docs + prose)
          # contract for describing the project. Either alone works; both
          # is ideal.
          if [ -f "$DEV_SCRIPT" ]; then
            echo "$DEV_SCRIPT found — first-class dev-start contract in use"
            if [ ! -x "$DEV_SCRIPT" ]; then
              echo "::notice::$DEV_SCRIPT is not executable — the pipeline runs it via \`bash\`, so this is not fatal, but \`chmod +x\` is conventional"
            fi
          else
            echo "::notice::No $DEV_SCRIPT — see claude-review README → 'dev-start.sh contract' for the recommended setup. Falling back to legacy bash-in-review-config.md extraction if present."
          fi

          if [ ! -f "$CONFIG" ]; then
            echo "::warning::No $CONFIG found — reviewers will rely on diff + issue only. Add one for better results."
            exit 0
          fi

          SECTIONS=0
          grep -q '^## Build preparation' "$CONFIG" && SECTIONS=$((SECTIONS+1)) || echo "::notice::$CONFIG missing '## Build preparation' section"
          grep -q '^## Convention files' "$CONFIG" && SECTIONS=$((SECTIONS+1)) || echo "::notice::$CONFIG missing '## Convention files' section"
          grep -q '^## Stack-specific review focus' "$CONFIG" && SECTIONS=$((SECTIONS+1)) || echo "::notice::$CONFIG missing '## Stack-specific review focus' section"
          grep -q '^## Functional validation' "$CONFIG" && SECTIONS=$((SECTIONS+1)) || echo "::notice::$CONFIG missing '## Functional validation' — prose describing what to exercise"
          grep -q '^### Auth' "$CONFIG" && SECTIONS=$((SECTIONS+1)) || echo "::warning::$CONFIG missing '### Auth' — functional testing will be unauthenticated"
          grep -q '^### Known service ports' "$CONFIG" && SECTIONS=$((SECTIONS+1)) || echo "::warning::$CONFIG missing '### Known service ports' — the pipeline won't know which URL to probe"
          echo "$CONFIG: $SECTIONS/6 recommended sections present"

          # Lint referenced file paths: scan for `cp SOURCE DEST` / `source FILE`
          # / `cat FILE` commands in both review-config.md and dev-start.sh.
          # Catches the "points at a file that doesn't exist" class of bug
          # without needing to parse shell.
          SCAN_FILES=""
          [ -f "$CONFIG" ] && SCAN_FILES="$CONFIG"
          [ -f "$DEV_SCRIPT" ] && SCAN_FILES="$SCAN_FILES $DEV_SCRIPT"
          REFERENCED_PATHS=$(grep -hoE '(cp|source|cat) +[A-Za-z0-9._/-]+' $SCAN_FILES 2>/dev/null | \
            awk '{print $2}' | \
            sort -u || true)
          MISSING_PATHS=""
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            # Skip destinations and locally-generated files:
            # - Dotfiles that a sample cp typically CREATES (.env, .env.dev,
            #   .env.prd, .env.local) — but keep .env.example/.env.sample,
            #   which are sources that SHOULD exist.
            # - Lock/log files that are build artefacts.
            # - Variable placeholders written into example snippets.
            case "$p" in
              .env|.env.dev|.env.prd|.env.local|.env.production|.env.development|.env.test) continue ;;
              *.lock|*.log) continue ;;
              \$*|*\$*) continue ;;
            esac
            if [ ! -e "$p" ]; then
              MISSING_PATHS="$MISSING_PATHS\n  - $p"
            fi
          done <<< "$REFERENCED_PATHS"
          if [ -n "$MISSING_PATHS" ]; then
            printf "::warning::Scanned files reference paths that don't exist in the repo. The functional tester/dev-start script will hit these as errors mid-run:%b\n" "$MISSING_PATHS"
            echo "::warning::Fix the paths in $SCAN_FILES or add the missing files."
          fi

      # Skip dependency install for pure documentation PRs.
      - name: Detect code changes
        id: code_check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          FILES=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json files --jq '.files[].path')
          DOCS_ONLY_PATTERN='^(README|CHANGELOG|CONTRIBUTING|CLAUDE|AGENTS|GEMINI)\.md$|^docs/|^LICENSE$'
          NON_DOCS=$(echo "$FILES" | grep -vE "$DOCS_ONLY_PATTERN" || true)
          if [ -n "$NON_DOCS" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "Pure docs PR — skipping build setup."
          fi

      # Detect package manager from lockfile.
      - name: Detect package manager
        id: pkg
        if: steps.code_check.outputs.needs_build == 'true'
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then echo "manager=yarn" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then echo "manager=npm" >> "$GITHUB_OUTPUT"
          else echo "manager=none" >> "$GITHUB_OUTPUT"; fi

      - name: Set up pnpm
        if: steps.pkg.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - name: Detect Node version file
        id: node_version
        if: steps.code_check.outputs.needs_build == 'true' && steps.pkg.outputs.manager != 'none'
        shell: bash
        run: |
          if [ -f .node-version ]; then echo "file=.node-version" >> "$GITHUB_OUTPUT"
          elif [ -f .nvmrc ]; then echo "file=.nvmrc" >> "$GITHUB_OUTPUT"
          else echo "file=" >> "$GITHUB_OUTPUT"; fi

      - name: Set up Node
        if: steps.code_check.outputs.needs_build == 'true' && steps.pkg.outputs.manager != 'none'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ${{ steps.node_version.outputs.file || '' }}
          node-version: ${{ steps.node_version.outputs.file == '' && 'lts/*' || '' }}
          cache: ${{ steps.pkg.outputs.manager }}

      # Soft-fail: degraded review is better than no review.
      - name: Install dependencies
        id: install
        if: steps.code_check.outputs.needs_build == 'true' && steps.pkg.outputs.manager != 'none'
        shell: bash
        env:
          PKG_MANAGER: ${{ steps.pkg.outputs.manager }}
        run: |
          set -euo pipefail
          case "$PKG_MANAGER" in
            pnpm) CMD="pnpm install --frozen-lockfile" ;;
            yarn) CMD="yarn install --frozen-lockfile" ;;
            npm)  CMD="npm ci" ;;
          esac
          if eval "$CMD"; then
            echo "install_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "install_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::$PKG_MANAGER install failed — build verification will be unavailable"
          fi

      # Cache Playwright browser binaries across PRs in the same consumer
      # repo. setup-node already caches the package store via its `cache:`
      # parameter; this is purely for ~/.cache/ms-playwright so we don't
      # re-download chromium every run. Key on lock-file hash so a PR that
      # bumps @playwright/test invalidates the cache.
      - name: Cache Playwright browsers
        if: steps.code_check.outputs.needs_build == 'true' && steps.install.outputs.install_ok == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('**/package-lock.json', '**/pnpm-lock.yaml', '**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      # Install Playwright browser for smoke tests (browser-based validation).
      # Becomes a no-op restore on cache hit.
      - name: Install Playwright browsers
        if: steps.code_check.outputs.needs_build == 'true' && steps.install.outputs.install_ok == 'true'
        shell: bash
        run: |
          # Auto-discover Playwright directory
          PW_DIR=$(find . -name 'playwright.config.*' -not -path '*/node_modules/*' -not -path '*/.review-pipeline/*' -not -path '*/.review-scripts/*' -exec dirname {} \; 2>/dev/null | head -1)
          if [ -z "$PW_DIR" ]; then
            PW_DIR=$(find . -maxdepth 3 -name 'package.json' -not -path '*/node_modules/*' -exec grep -l '"@playwright/test"' {} \; 2>/dev/null | head -1 | xargs dirname 2>/dev/null || true)
          fi
          if [ -n "$PW_DIR" ]; then
            echo "Found Playwright in $PW_DIR"
            cd "$PW_DIR" && npx playwright install chromium --with-deps 2>&1 | tail -5
            echo "Playwright chromium installed"
          else
            echo "No Playwright config found — skipping browser install"
          fi

      # Optional: GitHub App token for a custom review identity.
      # Requires all three secrets: APP_CLIENT_ID + APP_PRIVATE_KEY + APP_SLUG.
      # APP_SLUG is needed because installation tokens can't query /user.
      # Without these, falls back to GITHUB_TOKEN (github-actions[bot]).
      - name: Generate review token
        id: review_token
        shell: bash
        env:
          APP_CLIENT_ID: ${{ secrets.CLAUDE_REVIEW_APP_CLIENT_ID }}
          APP_SLUG: ${{ secrets.CLAUDE_REVIEW_APP_SLUG }}
        run: |
          if [ -n "$APP_CLIENT_ID" ]; then
            if [ -z "$APP_SLUG" ]; then
              echo "::error::CLAUDE_REVIEW_APP_CLIENT_ID is set but CLAUDE_REVIEW_APP_SLUG is not."
              echo "::error::APP_SLUG is required to identify the bot user for review dismissal."
              echo "::error::Find your app slug in the App's settings URL (github.com/apps/<slug>)"
              echo "::error::and add it as a repo secret named CLAUDE_REVIEW_APP_SLUG."
              exit 1
            fi
            echo "has_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App token
        id: app_token
        if: steps.review_token.outputs.has_app == 'true'
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.CLAUDE_REVIEW_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAUDE_REVIEW_APP_PRIVATE_KEY }}

      - name: Resolve review identity
        id: review_identity
        shell: bash
        env:
          HAS_APP: ${{ steps.review_token.outputs.has_app }}
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
          APP_SLUG: ${{ secrets.CLAUDE_REVIEW_APP_SLUG }}
          FALLBACK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$HAS_APP" = "true" ] && [ -n "$APP_TOKEN" ]; then
            # GitHub Apps post comments authored as "<app-slug>[bot]".
            BOT_USER="${APP_SLUG}[bot]"
            echo "token=$APP_TOKEN" >> "$GITHUB_OUTPUT"
          else
            BOT_USER="github-actions[bot]"
            echo "token=$FALLBACK_TOKEN" >> "$GITHUB_OUTPUT"
          fi
          echo "bot_user=$BOT_USER" >> "$GITHUB_OUTPUT"
          echo "Review identity: $BOT_USER"

      # First-review vs follow-up detection. The variable name stays
      # IS_FIRST_REVIEW (renaming churns every reader); what it gates is
      # round-1 vs round-2:
      #   - Round 1 (IS_FIRST_REVIEW=true): full fan including pass-2
      #     core+sweep redundancy and the gap-finder critic.
      #   - Round 2 (IS_FIRST_REVIEW=false): focused fan on
      #     /tmp/since-last.diff plus the resolution checker against the
      #     prior state artifact.
      # Detection is fail-closed: if the API can't be queried we default
      # to false rather than spending the +2.5x cost on
      # every push when auth glitches. This naturally distinguishes the
      # synchronize event (re-review, prior comments present) from
      # opened/reopened/ready_for_review (first review, none) and correctly
      # treats workflow_dispatch re-runs against a reviewed PR as re-reviews.
      #
      # All untrusted PR inputs (number) and bot identity (token, BOT_USER)
      # flow through env vars — never inlined into run: via ${{ }} — so
      # this step is not vulnerable to workflow-command injection.
      - name: Detect first review
        id: first_review
        shell: bash
        env:
          GH_TOKEN: ${{ steps.review_identity.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          BOT_USER: ${{ steps.review_identity.outputs.bot_user }}
        run: |
          set -uo pipefail
          IS_FIRST="false"
          # Track each gh call independently so a partial failure (one OK,
          # one network/auth error) is visible — the pre-existing single
          # warning only fired when BOTH calls failed, masking the more
          # likely "comments paginated and timed out mid-stream" case.
          REVIEWS_OK=true; COMMENTS_OK=true
          REVIEWS=$(gh api --paginate "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" 2>/dev/null) || { REVIEWS=""; REVIEWS_OK=false; }
          COMMENTS=$(gh api --paginate "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/comments" 2>/dev/null) || { COMMENTS=""; COMMENTS_OK=false; }
          if [ "$REVIEWS_OK" = "false" ] || [ "$COMMENTS_OK" = "false" ]; then
            echo "::warning::gh API failure on first-review detection (reviews_ok=$REVIEWS_OK, comments_ok=$COMMENTS_OK) — defaulting IS_FIRST_REVIEW=false (fail-closed)."
          else
            # gh api --paginate concatenates per-page arrays as separate
            # JSON inputs (newline-separated). Without -s the jq filter
            # runs once per page and produces multi-line counts, which
            # then crash the `[ -eq 0 ]` test with "integer expression
            # expected" — silently leaving IS_FIRST=false.
            # `-s 'add'` slurps all pages into one array first.
            PRIOR=$(echo "${REVIEWS:-[]}" | jq -s --arg bot "$BOT_USER" \
              'add | [.[] | select(.user.login == $bot and (.state == "APPROVED" or .state == "CHANGES_REQUESTED" or .state == "COMMENTED"))] | length' 2>/dev/null || echo "?")
            MARKER=$(echo "${COMMENTS:-[]}" | jq -s --arg bot "$BOT_USER" \
              'add | [.[] | select(.user.login == $bot)] | length' 2>/dev/null || echo "?")
            if ! [[ "$PRIOR" =~ ^[0-9]+$ ]] || ! [[ "$MARKER" =~ ^[0-9]+$ ]]; then
              echo "::warning::Could not parse review/comment counts (PRIOR='$PRIOR' MARKER='$MARKER') — defaulting IS_FIRST_REVIEW=false (fail-closed)."
            elif [ "$PRIOR" -eq 0 ] && [ "$MARKER" -eq 0 ]; then
              IS_FIRST="true"
            fi
          fi
          echo "is_first=$IS_FIRST" >> "$GITHUB_OUTPUT"
          echo "Round-1 detection: IS_FIRST_REVIEW=$IS_FIRST"

      # ── Review pipeline ─────────────────────────────────────────
      # Stage 1: Context Builder (Sonnet) — gathers PR data, runs build,
      #          writes context.md AND test-plan.md (test planning folded in)
      # Stage 2: Parallel — Core (Opus) + Sweep (Sonnet) + Test Runner (Sonnet)
      # Stage 3: Merge + Post (Bash) — deterministic, no LLM
      #
      # All Stage 2 agents run in parallel via background `claude -p`
      # processes, sharing the same context.md + test-plan.md.
      # Core + Sweep read code; Test Runner runs the app.

      # Write build status to a file the context-builder agent can read.
      # This is more reliable than env vars since the agent's Bash calls
      # always have access to filesystem but may not faithfully check env vars.
      - name: Write build status
        shell: bash
        run: |
          BUILD_OK="${{ (steps.code_check.outputs.needs_build == 'true' && steps.install.outputs.install_ok == 'true') && 'true' || 'false' }}"
          echo "{\"build_available\": $BUILD_OK, \"needs_build\": ${{ steps.code_check.outputs.needs_build || 'false' }}}" > /tmp/build-status.json
          echo "Build status: $(cat /tmp/build-status.json)"

      # Deterministic PRD detection — runs BEFORE the context-builder agent so
      # the result is available as a file the agent just reads (no bash interpretation).
      - name: Detect linked PRD
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          PR_TITLE=$(gh pr view "$PR_NUMBER" --json title --jq '.title' | tr '[:upper:]' '[:lower:]')
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body // ""')
          ISSUE_BODY=""
          ISSUE_NUM=$(gh pr view "$PR_NUMBER" --json closingIssuesReferences --jq '.closingIssuesReferences[0]?.number // empty')
          [ -n "$ISSUE_NUM" ] && ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --json body --jq '.body // ""' 2>/dev/null || true)

          PRD_FILES=""
          # 1. Explicit path references in PR/issue body
          for body in "$PR_BODY" "$ISSUE_BODY"; do
            MATCHES=$(echo "$body" | grep -oE 'docs/prds/[a-z0-9_-]+\.md' || true)
            PRD_FILES="$PRD_FILES $MATCHES"
          done
          # 2. Infer from PR title keywords
          PRD_FILES=$(echo "$PRD_FILES" | tr ' ' '\n' | sort -u | grep -v '^$' || true)
          if [ -z "$PRD_FILES" ] && [ -d docs/prds ]; then
            for prd in docs/prds/*.md; do
              BASENAME=$(basename "$prd" .md | sed 's/-prd$//')
              for word in $(echo "$BASENAME" | tr '-' '\n'); do
                [ ${#word} -lt 4 ] && continue
                # Strip trailing 's' for basic stem matching (e.g. "users" → "user")
                STEM=$(echo "$word" | sed 's/s$//')
                if echo "$PR_TITLE" | grep -qi "$STEM" 2>/dev/null; then
                  PRD_FILES="$prd"
                  break 2
                fi
              done
            done
          fi

          if [ -n "$PRD_FILES" ]; then
            echo "PRD detected: $PRD_FILES"
            echo "$PRD_FILES" > /tmp/prd-files.txt
            # Pre-concat PRD content so the agent just reads one file
            echo "# Linked PRD content (auto-detected from PR title)" > /tmp/prd-content.md
            echo "" >> /tmp/prd-content.md
            for pf in $PRD_FILES; do
              echo "## Source: $pf" >> /tmp/prd-content.md
              cat "$pf" >> /tmp/prd-content.md 2>/dev/null || true
              echo "" >> /tmp/prd-content.md
            done
            echo "PRD content: $(wc -l < /tmp/prd-content.md) lines"
          else
            echo "No PRD detected for: $PR_TITLE"
            # Truncate with `: >` rather than `echo "" >` — the latter writes
            # a newline (1 byte), which the downstream `[ -s prd-content.md ]`
            # guard on the spec-compliance launch treats as non-empty content
            # and fires the spec reviewer against an empty PRD.
            : > /tmp/prd-files.txt
            : > /tmp/prd-content.md
          fi

      # ── Round-2 follow-up review: state read ─────────────────────
      # On a follow-up review (IS_FIRST_REVIEW=false), look up the most
      # recent successful review run on this branch and download its state
      # artifact. The artifact contains the prior review's deduped findings
      # and the SHA we reviewed against; the round-2 fan reads both.
      #
      # Permissions: actions/download-artifact@v6 with run-id requires
      # `actions: read` (added at the job level above).
      #
      # Fail-closed: when the artifact is missing despite IS_FIRST_REVIEW=false
      # (prior run failed before upload, or retention expired), the round-2
      # steps gate on the file's presence and degrade to a full re-review
      # with a ::notice:: explaining why.
      # Look for a prior run that uploaded the round-state artifact. The
      # artifact is what makes round-2 possible — not whether a bot review
      # was posted. So we search for any prior run on this branch that has
      # a `claude-review-state-pr-N` artifact (uploaded on `claude_run.outcome
      # == success`, regardless of the rest of the run's outcome) and use
      # the most recent. If a prior run was cancelled mid-flight or its
      # post-step failed, we still get the last good state.
      #
      # This also makes round-2 fire on ANY 2nd-or-later run with a state
      # artifact, even when the first-review detection above said `is_first`
      # — e.g. when the bot review couldn't be posted (auth glitch) but
      # the analyzer did finish and uploaded state. The verdict gate still
      # protects against bad state via the artifact's schema check.
      - name: Find prior review run
        id: prior_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          ARTIFACT_NAME="claude-review-state-pr-${PR_NUMBER}"
          # List up to 30 recent runs on this branch, then find the most
          # recent one whose artifacts include the per-PR state artifact.
          RUN_IDS=$(gh api --paginate "repos/${REPO}/actions/runs?branch=${BRANCH}&per_page=30" \
            --jq '.workflow_runs[].id' 2>/dev/null || echo "")
          RUN_ID=""
          for id in $RUN_IDS; do
            HAS=$(gh api "repos/${REPO}/actions/runs/${id}/artifacts" \
              --jq ".artifacts[] | select(.name==\"${ARTIFACT_NAME}\") | .id" \
              2>/dev/null | head -1)
            if [ -n "$HAS" ]; then
              RUN_ID="$id"
              break
            fi
          done
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          if [ -z "$RUN_ID" ]; then
            echo "No prior review-state artifact found for PR #${PR_NUMBER} on branch ${BRANCH} — round 1 (full review)."
          else
            echo "Prior review-state artifact: run_id=${RUN_ID} → round 2 (focused on diff-since-last)."
          fi

      - name: Download prior review state
        if: steps.prior_run.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: claude-review-state-pr-${{ github.event.pull_request.number || inputs.pr_number }}
          path: /tmp/prior-state
          run-id: ${{ steps.prior_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve prior review state
        if: steps.prior_run.outputs.run_id != ''
        id: prior_state
        shell: bash
        run: |
          set -uo pipefail
          if [ -f /tmp/prior-state/state.json ]; then
            PRIOR_HEAD_SHA=$(jq -r '.prior_head_sha // empty' /tmp/prior-state/state.json 2>/dev/null || echo "")
            if [ -n "$PRIOR_HEAD_SHA" ]; then
              echo "Prior state loaded: head=$PRIOR_HEAD_SHA, findings=$(jq '.findings | length' /tmp/prior-state/state.json), verdict=$(jq -r '.verdict' /tmp/prior-state/state.json)"
              echo "prior_head_sha=$PRIOR_HEAD_SHA" >> "$GITHUB_OUTPUT"
              echo "available=true" >> "$GITHUB_OUTPUT"
            else
              echo "::notice::Prior state file present but missing prior_head_sha — degrading to full re-review."
              echo "available=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::notice::Prior run identified but no state artifact downloaded — degrading to full re-review. Likely cause: download step failed or retention expired."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      # Extract every recognized ticket-reference pattern from the branch name,
      # PR title, and PR body into a structured candidates file. Provider-agnostic:
      # we never hardcode a tracker's host or ID format. The optional hook script
      # (next step) reads this file and decides which signal matches its tracker.
      # Runs unconditionally — the file is always present and well-formed even when
      # nothing matches, so downstream readers don't need a guard.
      - name: Extract external-issue candidates
        shell: bash
        env:
          # PR metadata flows through env vars (never inlined into run: via ${{ }})
          # to avoid command injection from a maliciously-crafted PR body/title/branch.
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -uo pipefail
          # Pre-create /tmp/external-issue.md as empty so the context-builder skill's
          # "ALWAYS read" invariant holds for pure-GitHub consumers (no hook script).
          # The hook step below overwrites this on opt-in; otherwise it stays empty
          # and Turn 6-7 omits the "Linked external issue" section.
          : > /tmp/external-issue.md

          python3 <<'PY'
          import json, os, re

          pr_title = os.environ.get('PR_TITLE') or ''
          pr_body = os.environ.get('PR_BODY') or ''
          head_ref = os.environ.get('HEAD_REF') or ''

          TICKET_RE = re.compile(r'\b[A-Z][A-Z0-9]+-\d+\b')
          URL_RE = re.compile(r'https?://[^\s)\]>]+')
          URL_WITH_HOST_RE = re.compile(r'https?://([^/\s)\]>]+)')
          # Lines like "Key: value" — we filter to values that contain a URL or
          # ticket ID, otherwise every "Status: WIP" line becomes a marker.
          LINE_MARKER_RE = re.compile(
              r'^\s*([A-Za-z][A-Za-z0-9_-]*)\s*:\s*(.+?)\s*$',
              re.MULTILINE,
          )
          # Closing-keyword style: "Fixes LIN-123", "Closes https://..."
          CLOSING_RE = re.compile(
              r'\b(fixes?|closes?|resolves?|implements?|refs?|tracks?)\s+'
              r'(https?://\S+|[A-Z][A-Z0-9]+-\d+)',
              re.IGNORECASE,
          )

          def strip_trailing_punct(s):
              return s.rstrip('.,;:!?')

          explicit_markers = []
          closing_keywords = []
          urls = []
          ids = []

          # Tier 1: explicit markers in PR body.
          for key, value in LINE_MARKER_RE.findall(pr_body):
              if URL_RE.search(value) or TICKET_RE.search(value):
                  explicit_markers.append({
                      'key': key,
                      'value': value.strip(),
                      'source': 'pr_body_line',
                  })

          # Tier 2: closing-keyword matches in PR body.
          seen_closing = set()
          for keyword, target in CLOSING_RE.findall(pr_body):
              target = strip_trailing_punct(target)
              sig = (keyword.lower(), target)
              if sig in seen_closing:
                  continue
              seen_closing.add(sig)
              closing_keywords.append({
                  'keyword': keyword,
                  'target': target,
                  'source': 'pr_body',
              })

          # Tier 3: URLs in PR body, host exposed.
          seen_urls = set()
          for url in URL_RE.findall(pr_body):
              url = strip_trailing_punct(url)
              if url in seen_urls:
                  continue
              seen_urls.add(url)
              m = URL_WITH_HOST_RE.match(url)
              host = m.group(1) if m else ''
              urls.append({'url': url, 'host': host, 'source': 'pr_body'})

          # Tier 4: branch-name ticket tokens.
          branch_seen = set()
          for m in TICKET_RE.finditer(head_ref):
              tok = m.group(0)
              if tok in branch_seen:
                  continue
              branch_seen.add(tok)
              ids.append({'id': tok, 'source': 'branch_name'})

          # Tier 5: PR-body ticket tokens (dedup per-source).
          body_seen = set()
          for m in TICKET_RE.finditer(pr_body):
              tok = m.group(0)
              if tok in body_seen:
                  continue
              body_seen.add(tok)
              ids.append({'id': tok, 'source': 'pr_body'})

          # PR-title ticket tokens (dedup per-source). Titles often carry a
          # `[LIN-123]` prefix; catching them here means a ticket mentioned only
          # in the title still surfaces even if the branch naming convention
          # isn't followed.
          title_seen = set()
          for m in TICKET_RE.finditer(pr_title):
              tok = m.group(0)
              if tok in title_seen:
                  continue
              title_seen.add(tok)
              ids.append({'id': tok, 'source': 'pr_title'})

          out = {
              'explicit_markers': explicit_markers,
              'closing_keywords': closing_keywords,
              'urls': urls,
              'ids': ids,
          }
          with open('/tmp/external-issue-candidates.json', 'w') as f:
              json.dump(out, f, indent=2)

          branch_ids = sum(1 for i in ids if i['source'] == 'branch_name')
          body_ids = sum(1 for i in ids if i['source'] == 'pr_body')
          title_ids = sum(1 for i in ids if i['source'] == 'pr_title')
          print(
              f"External-issue candidates: {len(explicit_markers)} markers, "
              f"{len(closing_keywords)} keywords, {len(urls)} urls, "
              f"{branch_ids} branch-ids, {body_ids} body-ids, {title_ids} title-ids"
          )
          PY

      # Optional hook: if the consumer repo has a fetch-issue.sh script, run it
      # with PR metadata + candidates-file path + TRACKER_SECRETS-derived env
      # vars. Stdout is inlined into context.md as the external-spec section.
      # Soft-fails — a bad credential or tracker outage must not block reviews.
      # GH_TOKEN is deliberately NOT forwarded; consumers who need authenticated
      # GitHub calls put their own PAT in TRACKER_SECRETS.
      - name: Fetch external linked issue (optional hook)
        if: hashFiles('.github/claude-review/fetch-issue.sh') != ''
        continue-on-error: true
        shell: bash
        env:
          # Untrusted PR inputs flow through env only (never ${{ }} in run:).
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          REPO: ${{ github.repository }}
          ISSUE_CANDIDATES_FILE: /tmp/external-issue-candidates.json
          TRACKER_SECRETS: ${{ secrets.TRACKER_SECRETS }}
        run: |
          set -uo pipefail
          # Expose each KEY=VALUE line of TRACKER_SECRETS as an env var to the
          # script. Consumers pick their own names ($LINEAR_API_KEY, $JIRA_EMAIL,
          # whatever). Blank lines and `# comments` are skipped; everything after
          # the first `=` is preserved verbatim so tokens containing `=` survive.
          if [ -n "${TRACKER_SECRETS:-}" ]; then
            while IFS= read -r line; do
              case "$line" in ''|'#'*) continue ;; esac
              [[ "$line" != *=* ]] && continue
              export "${line%%=*}=${line#*=}"
            done <<< "$TRACKER_SECRETS"
          fi
          chmod +x .github/claude-review/fetch-issue.sh
          .github/claude-review/fetch-issue.sh > /tmp/external-issue.md 2> /tmp/fetch-issue.stderr || {
            echo "::warning::fetch-issue.sh exited non-zero — continuing without external spec"
            cat /tmp/fetch-issue.stderr >&2 || true
            : > /tmp/external-issue.md
          }

      # Launch the consumer's dev environment in the background so it brings
      # up alongside the context-builder + Playwright MCP setup, instead of
      # blocking the analyzer fan. The wait step further down reaps the PID
      # and replays captured outputs / exit code into the real $GITHUB_OUTPUT.
      - name: Pre-start dev environment (background)
        if: steps.code_check.outputs.needs_build == 'true' && steps.install.outputs.install_ok == 'true'
        id: dev_env_bg
        shell: bash
        env:
          PKG_MANAGER: ${{ steps.pkg.outputs.manager }}
        run: |
          set -uo pipefail
          mkdir -p /tmp/dev-env
          : > /tmp/dev-env/outputs
          : > /tmp/dev-env/log
          rm -f /tmp/dev-env/rc
          # Detach the bring-up from this step's process group + job table so
          # GitHub Actions doesn't SIGKILL it at step-end. setsid creates a
          # new session (the recorded PID is the new group leader), nohup
          # ignores SIGHUP, < /dev/null prevents tty inheritance, and disown
          # removes the job from the launching shell's table. The wait step
          # honors /tmp/dev-env/rc; the kill paths use `kill -- -PID` so the
          # whole group (dev server + children) is reaped, not just the
          # wrapper.
          setsid nohup bash -c '
            GITHUB_OUTPUT=/tmp/dev-env/outputs .review-scripts/setup-dev-env.sh
            echo $? > /tmp/dev-env/rc
          ' > /tmp/dev-env/log 2>&1 < /dev/null &
          PID=$!
          disown "$PID"
          echo "$PID" > /tmp/dev-env/pid
          echo "Background dev-env launched: PID=$PID (process group leader)"

      - name: 'Review: build context'
        id: context_builder
        # Don't fail the job if the action returns non-zero (e.g. max-turns).
        # context.md and test-plan.md may have been written in final turns;
        # the next step's `[ ! -f context.md ]` guard catches genuine failures.
        continue-on-error: true
        uses: anthropics/claude-code-action@b47fd721da662d48c5680e154ad16a73ed74d2e0 # v1
        env:
          REVIEW_BOT_USER: ${{ steps.review_identity.outputs.bot_user }}
          REVIEW_BUILD_AVAILABLE: ${{ (steps.code_check.outputs.needs_build == 'true' && steps.install.outputs.install_ok == 'true') && 'true' || 'false' }}
          # Round-2 only: SHA the previous review covered. The skill uses
          # this to compute /tmp/since-last.diff and emit a "Diff since
          # last review" section in context.md. Empty/unset on round 1.
          PRIOR_HEAD_SHA: ${{ steps.prior_state.outputs.prior_head_sha }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.review_identity.outputs.token }}
          prompt: |
            Read ${{ env.CLAUDE_REVIEW_PIPELINE_DIR }}/skills/review-context-builder.md and follow it exactly. PR number: ${{ github.event.pull_request.number || inputs.pr_number }}. When done, context.md AND test-plan.md must exist at the repo root. Write both BEFORE running out of turns — partial output beats no output.
          claude_args: |
            --model ${{ inputs.model_standard }}
            --permission-mode dontAsk
            --setting-sources user
            --allowedTools Bash,Read,Glob,Grep,Write
            --disallowedTools Edit,WebFetch,WebSearch
            --max-turns 60
          show_full_output: 'true'

      # Fail-fast gate: if the context builder didn't leave a context.md on
      # disk (usually because it hit --max-turns), skip the analyzer fan and
      # reap the background dev-env so it doesn't keep running. The analyzer
      # step below would abort the job anyway. We keep `continue-on-error:
      # true` on the builder itself because a partial context.md written
      # just before the turn limit is still better than no context.
      - name: Check context.md exists
        id: check_context
        shell: bash
        run: |
          if [ -f context.md ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "context.md present ($(wc -l < context.md) lines) — continuing to analyzer"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::error::context.md was not written by the context builder. Check the 'Review: build context' step log — max-turns is the most common cause. Skipping analyzer; reaping background dev-env."
            # Reap the background dev-env's whole process group (the
            # setsid-detached launcher + the dev server it spawned).
            # `kill -- -PID` signals the group; the leading -- is mandatory
            # so the negative PID isn't parsed as an option.
            if [ -f /tmp/dev-env/pid ]; then
              kill -- -"$(cat /tmp/dev-env/pid)" 2>/dev/null || true
            fi
          fi

      - name: Setup Playwright MCP for test runner
        if: steps.code_check.outputs.needs_build == 'true' && steps.check_context.outputs.exists == 'true'
        shell: bash
        run: |
          # Force --output-dir so screenshots land in a known location.
          # Without this, Playwright MCP defaults to os.tmpdir()/playwright-mcp-output/<sessionId>/...
          # which our upload step never finds.
          mkdir -p /tmp/screenshots
          cat > /tmp/mcp-playwright.json << 'MCPEOF'
          {
            "mcpServers": {
              "playwright": {
                "command": "npx",
                "args": ["@playwright/mcp@latest", "--headless", "--output-dir", "/tmp/screenshots"]
              }
            }
          }
          MCPEOF
          sed -i 's/^[[:space:]]*//' /tmp/mcp-playwright.json

      # Wait for the background dev-env that was launched alongside the
      # context-builder. Replays captured outputs into $GITHUB_OUTPUT and
      # honors the script's exit code (a failed dev-start.sh still aborts
      # the workflow, same as the previous synchronous step).
      - name: Wait for background dev-env
        if: steps.code_check.outputs.needs_build == 'true' && steps.install.outputs.install_ok == 'true' && steps.check_context.outputs.exists == 'true'
        id: dev_env
        shell: bash
        env:
          PKG_MANAGER: ${{ steps.pkg.outputs.manager }}
        run: |
          set -uo pipefail
          source .review-scripts/phase-timing.sh
          phase_start dev-env
          # Degraded path: if the background launcher never ran (e.g. a
          # condition skipped it), bring up the dev-env synchronously now.
          if [ ! -f /tmp/dev-env/pid ]; then
            echo "::warning::Background dev-env was not started — running setup-dev-env.sh synchronously"
            .review-scripts/setup-dev-env.sh
            RC=$?
            phase_end dev-env
            exit $RC
          fi
          PID=$(cat /tmp/dev-env/pid)
          DEADLINE=$(( $(date +%s) + 180 ))
          while kill -0 "$PID" 2>/dev/null; do
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "::error::Background dev-env timed out after 180s; killing process group -$PID"
              kill -- -"$PID" 2>/dev/null || true
              [ -f /tmp/dev-env/log ] && tail -200 /tmp/dev-env/log
              phase_end dev-env
              exit 1
            fi
            sleep 1
          done
          # Replay log + outputs.
          [ -f /tmp/dev-env/log ] && cat /tmp/dev-env/log
          if [ -s /tmp/dev-env/outputs ]; then
            cat /tmp/dev-env/outputs >> "$GITHUB_OUTPUT"
          fi
          phase_end dev-env
          # Honor the inner script's exit code: non-zero means dev-start.sh
          # failed and we must abort the workflow (same as the previous
          # synchronous step's `exit 1` path inside setup-dev-env.sh).
          # Missing rc means the bg shell died before writing it (signal,
          # OOM, runner cleanup) — fail loudly rather than silently
          # succeeding with WEB_READY=false.
          if [ -f /tmp/dev-env/rc ]; then
            RC=$(cat /tmp/dev-env/rc)
            exit "$RC"
          fi
          echo "::error::Background dev-env exited without writing /tmp/dev-env/rc — bring-up did not complete. Treating as failure."
          exit 1

      - name: 'Review: analyze code + test (parallel core + sweep + test runner)'
        id: claude_run
        shell: bash
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.review_identity.outputs.token }}
          # Separate token for writing to the review-assets branch: the custom
          # GitHub App token may lack `contents: write`, but the job's
          # GITHUB_TOKEN always has it (see `permissions:` at job level).
          GITHUB_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          NEEDS_BUILD: ${{ steps.code_check.outputs.needs_build || 'true' }}
          API_READY: ${{ steps.dev_env.outputs.api_ready || 'false' }}
          API_URL: ${{ steps.dev_env.outputs.api_url || '' }}
          WEB_READY: ${{ steps.dev_env.outputs.web_ready || 'false' }}
          WEB_URL: ${{ steps.dev_env.outputs.web_url || '' }}
          AUTH_READY: ${{ steps.dev_env.outputs.auth_ready || 'false' }}
          IS_FIRST_REVIEW: ${{ steps.first_review.outputs.is_first }}
          PRIOR_STATE_AVAILABLE: ${{ steps.prior_state.outputs.available || 'false' }}
          PRIOR_HEAD_SHA: ${{ steps.prior_state.outputs.prior_head_sha || '' }}
        run: |
          set -euo pipefail

          if [ ! -f context.md ]; then
            echo "::error::context.md not found -- context builder failed"
            exit 1
          fi

          # Pre-load skill files into the prompt instead of asking the agent to
          # Read them. Reviewer agents have only Read+Write tools (no Bash/Glob)
          # and have shown they sometimes fail to resolve relative paths under
          # the hidden `.claude/` directory at runtime. We also can't rely on
          # `.claude/skills/` existing at this point: anthropics/claude-code-action
          # restores `.claude/` from origin/main for "untrusted" PR heads, so any
          # files the composite action placed there have already been wiped.
          # Instead we read from CLAUDE_REVIEW_PIPELINE_DIR (exported by the
          # install action), which points at the action's own directory under
          # /home/runner/work/_actions/... — outside the workspace and not
          # touched by claude-code-action's restore.
          SKILLS_DIR="${CLAUDE_REVIEW_PIPELINE_DIR:-}/skills"
          for skill in review-core review-sweep; do
            if [ ! -f "$SKILLS_DIR/${skill}.md" ]; then
              echo "::error::${skill}.md not found at $SKILLS_DIR — composite action install failed (CLAUDE_REVIEW_PIPELINE_DIR=${CLAUDE_REVIEW_PIPELINE_DIR:-unset})"
              exit 1
            fi
          done

          # bugbot.md is optional, project-specific. Inline it when present.
          # printf %s preserves the blank-line header spacing.
          BUGBOT_BLOCK=""
          if [ -f bugbot.md ]; then
            BUGBOT_BLOCK=$(printf '\n\n=== bugbot.md (project-specific review standards) ===\n\n%s' "$(cat bugbot.md)")
          fi

          # Round-2 hint: when prior-state was loaded, tell the reviewers to
          # spend their turn budget on the diff-since-last first. Empty on
          # round 1, so it's a no-op there.
          ROUND2_HINT=""
          if [ "${PRIOR_STATE_AVAILABLE:-false}" = "true" ]; then
            ROUND2_HINT=$'\n\nROUND-2 FOCUS: This is a follow-up review. context.md has a `## Diff since last review` section listing the files changed since the prior review. Per-file diffs for that subset are at `/tmp/since-last-chunks/<file>.diff` (slashes replaced with `--`). Spend your turn budget on those changes first; the resolution checker covers prior findings, so do not re-flag issues already classified there.'
          fi

          echo "::group::Launch parallel reviewers + test runner"
          set -x   # trace launches so any abort points at its own line

          # PID + log-path map indexed by role. The wait + status + log
          # blocks below iterate it once instead of duplicating per role.
          declare -A PIDS=()
          declare -A LOGS=(
            [core]=/tmp/core-output.txt
            [sweep]=/tmp/sweep-output.txt
            [spec]=/tmp/spec-output.txt
            [functional]=/tmp/functional-output.txt
            [core-pass2]=/tmp/core-output-2.txt
            [sweep-pass2]=/tmp/sweep-output-2.txt
            [resolution]=/tmp/resolution-output.txt
            [gap]=/tmp/gap-output.txt
          )

          # Reap any agents still alive on early exit so their output files
          # survive (the runner SIGTERMs background children otherwise).
          reap_on_exit() {
            local rc=$?
            set +x
            for pid in "${PIDS[@]}"; do
              [ -n "$pid" ] && kill -0 "$pid" 2>/dev/null && wait "$pid" 2>/dev/null || true
            done
            exit "$rc"
          }
          trap reap_on_exit EXIT

          # launch_agent — background a single read-only reviewer.
          # Prompt order: <skill> + <bugbot> + <PR-specific framing> so the
          # constant prefix maximises (model, prefix) cache hits across PRs.
          # Args: ROLE SKILL_NAME MODEL MAX_TURNS FRAMING [INCLUDE_BUGBOT=true]
          # Sets PIDS[$role].
          # INCLUDE_BUGBOT=false skips the project's bugbot.md block. Use
          # for purely-mechanical agents (resolution checker) where bugbot's
          # "do not flag X" / "accepted trade-off" rules would create
          # ambient pressure to mis-classify findings — e.g. the resolution
          # checker decides RESOLVED based on *code evidence*, not on
          # whether policy now accepts the issue.
          launch_agent() {
            local role="$1" skill="$2" model="$3" max_turns="$4" framing="$5"
            local include_bugbot="${6:-true}"
            local skill_path="$SKILLS_DIR/${skill}.md"
            if [ ! -f "$skill_path" ]; then
              echo "::error::${skill}.md not found at $SKILLS_DIR — composite action install failed"
              exit 1
            fi
            local skill_text bugbot=""
            skill_text=$(cat "$skill_path")
            [ "$include_bugbot" = "true" ] && bugbot="$BUGBOT_BLOCK"
            ~/.local/bin/claude -p "=== ${skill} skill (follow exactly) ===

          ${skill_text}${bugbot}

          ${framing}" \
              --model "$model" \
              --permission-mode dontAsk \
              --setting-sources user \
              --allowedTools Read,Write \
              --disallowedTools Bash,Edit,Glob,Grep,WebFetch,WebSearch \
              --max-turns "$max_turns" > "${LOGS[$role]}" 2>&1 &
            PIDS[$role]=$!
          }

          launch_agent core review-core "${{ inputs.model_high }}" 15 \
            "You are the core reviewer for PR #$PR_NUMBER. context.md at the repo root is an INDEX — Read it, then Read the diff chunks and spec sources it points at (per the Turn 1 instructions in the skill above). Follow the skill above exactly, including writing the JSON output files it specifies.${ROUND2_HINT}"

          launch_agent sweep review-sweep "${{ inputs.model_standard }}" 10 \
            "You are the sweep reviewer for PR #$PR_NUMBER. context.md at the repo root is an INDEX — Read it, then Read the diff chunks it points at (per the Turn 1 instructions in the skill above). Follow the skill above exactly, including writing the JSON output file it specifies.${ROUND2_HINT}"

          # Round-1 only: a second independent pass of core + sweep. Same
          # skills, independent LLM sampling — the union catches misses.
          # Pass-2 writes to *-findings-2.json so pass-1 verdict-critical
          # meta is not clobbered.
          # Gate is "no prior state artifact" — i.e. this is the first
          # attempt at this PR with no usable history. On round 2+ the
          # resolution checker + focused diff replace the boost; running
          # it again would re-flag everything we already classified.
          if [ "${PRIOR_STATE_AVAILABLE:-false}" != "true" ]; then
            echo "Round-1 redundancy: launching core + sweep pass-2 in parallel"
            launch_agent core-pass2 review-core "${{ inputs.model_high }}" 15 \
              "You are the core reviewer for PR #$PR_NUMBER (PASS 2 — independent re-review). context.md at the repo root is an INDEX — Read it, then Read the diff chunks and spec sources it points at (per the Turn 1 instructions in the skill above). OUTPUT_FINDINGS=/tmp/core-findings-2.json OUTPUT_META=/tmp/core-meta-2.json — write to these paths so pass-1 is not clobbered. Follow the skill above exactly, including writing the JSON output files it specifies."
            launch_agent sweep-pass2 review-sweep "${{ inputs.model_standard }}" 10 \
              "You are the sweep reviewer for PR #$PR_NUMBER (PASS 2 — independent re-review). context.md at the repo root is an INDEX — Read it, then Read the diff chunks it points at (per the Turn 1 instructions in the skill above). OUTPUT_FINDINGS=/tmp/sweep-findings-2.json — write to this path so pass-1 is not clobbered. Follow the skill above exactly, including writing the JSON output file it specifies."
          fi

          # Round-2 only: classify every prior finding as RESOLVED /
          # STILL_PRESENT / NEW_CONTEXT against the diff-since-last. Output
          # at /tmp/resolution-status.json drives both the body section and
          # the verdict-table adjustment downstream.
          if [ "${PRIOR_STATE_AVAILABLE:-false}" = "true" ] && [ -f /tmp/prior-state/state.json ] && [ -f /tmp/since-last.diff ]; then
            echo "Round-2: launching resolution checker (Sonnet, parallel)"
            launch_agent resolution review-resolution-checker "${{ inputs.model_standard }}" 10 \
              "You are the resolution checker for PR #$PR_NUMBER. /tmp/prior-state/state.json contains the previous review's findings. /tmp/since-last.diff contains the changes since that review. Classify every prior finding as RESOLVED / STILL_PRESENT / NEW_CONTEXT and write /tmp/resolution-status.json. If — and only if — you spot a high-severity (critical/major) net-new issue in the diff that the prior reviewers clearly missed, append it to /tmp/resolution-findings.json (otherwise write []). Follow the skill above exactly." \
              false
          fi

          # Spec-compliance: PRD-vs-code comparison; runs only when a PRD was
          # detected (otherwise no spec to compare against).
          if [ -s /tmp/prd-content.md ]; then
            echo "Running spec-compliance reviewer (PRD detected)..."
            launch_agent spec review-spec-compliance "${{ inputs.model_standard }}" 10 \
              "You are the spec-compliance reviewer for PR #$PR_NUMBER. context.md at the repo root is an INDEX — Read it, then Read the spec sources (/tmp/prd-content.md, /tmp/external-issue.md, /tmp/issue.json) and the diff chunks it points at, per the Turn 1 instructions in the skill above. Follow the skill above exactly, including writing the JSON output file it specifies.${ROUND2_HINT}"
          else
            echo "Spec-compliance reviewer skipped — no PRD detected"
          fi

          # Generate functional prompt from template.
          # Never let helper-script failure kill the whole step — by now the
          # core/sweep reviewers (and any pass-2 / spec / resolution agents)
          # have been launched into PIDS[], and errexit here would trip
          # before `wait`, orphaning them and producing an "analyzer
          # crashed" outcome with zero-byte output files. Functional
          # testing is best-effort: if the prompt can't be built we warn
          # and skip the tester, then still wait on the rest.
          .review-scripts/generate-functional-prompt.sh \
            || echo "::warning::generate-functional-prompt.sh failed — functional tester will be skipped (core + sweep continue)"

          # Functional tester: single AI agent with Playwright MCP + Bash.
          # Separate launch (different MCP config + tool list) — not driven
          # by launch_agent. Skips when the planner said skip, the web
          # service didn't come up, or there's no prompt to drive it.
          if [ "$NEEDS_BUILD" = "true" ] && [ "$WEB_READY" = "true" ] && [ -f test-plan.md ] && [ -s /tmp/functional-prompt.txt ]; then
            # `|| true` guards against missing '## Strategy:' line: grep's
            # non-zero exit would otherwise abort the step under set -e.
            STRATEGY=$(grep -m1 -iE '^## Strategy:' test-plan.md 2>/dev/null | sed -E 's/.*Strategy:[[:space:]]*//' | tr -d '[:space:]' || true)
            if [ "$STRATEGY" != "skip" ]; then
              echo "Running functional tester (Playwright + Bash) — strategy: ${STRATEGY:-unknown}..."
              mkdir -p /tmp/screenshots
              ~/.local/bin/claude -p "$(cat /tmp/functional-prompt.txt)" \
                --model ${{ inputs.model_standard }} \
                --mcp-config /tmp/mcp-playwright.json \
                --permission-mode dontAsk \
                --allowedTools "Bash,Read,Write,ToolSearch,mcp__playwright__browser_navigate,mcp__playwright__browser_take_screenshot,mcp__playwright__browser_snapshot,mcp__playwright__browser_console_messages,mcp__playwright__browser_click,mcp__playwright__browser_fill_form,mcp__playwright__browser_wait_for,mcp__playwright__browser_close,mcp__playwright__browser_select_option,mcp__playwright__browser_press_key,mcp__playwright__browser_type,mcp__playwright__browser_hover,mcp__playwright__browser_resize,mcp__playwright__browser_tabs,mcp__playwright__browser_navigate_back,mcp__playwright__browser_evaluate" \
                --max-turns 80 > "${LOGS[functional]}" 2>&1 &
              PIDS[functional]=$!
            else
              echo "Functional tester skipped — strategy: skip"
            fi
          else
            echo "Functional tester skipped (docs-only PR, web not ready, or no test plan)"
          fi

          # Default empty output files so downstream merge always has valid JSON.
          [ -f /tmp/functional-findings.json ] || echo '[]' > /tmp/functional-findings.json
          [ -f /tmp/functional-meta.json ] || echo '{"strategy":"skip","areas_tested":[],"screenshots":[],"overall":"PASS","summary":"Functional testing skipped.","uncertain_observations":[]}' > /tmp/functional-meta.json

          # Wait for every launched parallel agent. Status convention:
          # 1 = launched and exited 0; 0 = launched and failed; 1 also for
          # "not launched" so the summary line doesn't show FAILED on
          # legitimately-skipped roles. ROLES is the single source of truth
          # for which agents go through the wait/status/log loops below —
          # gap-finder is launched separately in its own block (sequential
          # after the parallel fan), so it is intentionally excluded.
          ROLES=(core sweep spec functional core-pass2 sweep-pass2 resolution)
          declare -A AGENT_OK=()
          for role in "${ROLES[@]}"; do
            if [ -z "${PIDS[$role]:-}" ]; then
              AGENT_OK[$role]=1; continue
            fi
            AGENT_OK[$role]=0
            wait "${PIDS[$role]}" && AGENT_OK[$role]=1 || true
          done
          # build-review.sh's smoke gate reads FUNCTIONAL_OK directly.
          FUNCTIONAL_OK="${AGENT_OK[functional]}"

          status_parts=()
          for role in "${ROLES[@]}"; do
            if [ "${AGENT_OK[$role]}" -eq 1 ]; then status_parts+=("$role: OK")
            else status_parts+=("$role: FAILED"); fi
          done
          ( IFS=', '; echo "${status_parts[*]}" )
          echo "::endgroup::"

          # Replay each agent's log in its own group.
          for role in "${ROLES[@]}"; do
            echo "::group::${role} log"
            [ -f "${LOGS[$role]}" ] && cat "${LOGS[$role]}" || echo "(skipped or no output)"
            echo "::endgroup::"
          done

          # Round-1 critic: gap-finder. Sequential — runs AFTER core+sweep
          # (and any pass-2 / spec) finish, so the critic sees the union of
          # every prior finding and hunts for what they missed. Output goes
          # through Haiku dedup downstream so any overlap collapses there.
          # Soft-skip on missing skill (gap-finder is non-blocking — pass-1
          # findings are still useful without a critic), unlike the hard
          # exits in launch_agent for the always-on roles.
          if [ "${IS_FIRST_REVIEW:-false}" = "true" ]; then
            if [ ! -f "$SKILLS_DIR/review-gap-finder.md" ]; then
              echo "::warning::review-gap-finder.md not found at $SKILLS_DIR — skipping gap-finder stage"
            else
              echo "::group::Gap-finder critic (Opus, sequential)"
              launch_agent gap review-gap-finder "${{ inputs.model_high }}" 16 \
                "You are the gap-finder critic for PR #$PR_NUMBER. context.md at the repo root is an INDEX — Read it, then Read the diff chunks and spec sources it points at, per the Turn 1 instructions in the skill above. The prior-pass finding files (/tmp/core-findings.json, /tmp/core-findings-2.json, /tmp/sweep-findings.json, /tmp/sweep-findings-2.json, /tmp/spec-findings.json) are the dedup baseline — Read each that exists. Follow the skill above exactly, including writing the JSON output file it specifies.${ROUND2_HINT}"
              wait "${PIDS[gap]}" || echo "::warning::gap-finder exited non-zero — continuing with prior findings only"
              # Synthesize [] when the agent exited cleanly but never wrote
              # the file (e.g. hit max-turns mid-draft). The skill documents
              # `[]` as the clean-run success state so this is indistinguishable
              # downstream — emit a warning so the log shows what happened.
              if [ ! -f /tmp/gap-findings.json ]; then
                echo "::warning::gap-finder did not write /tmp/gap-findings.json despite exiting cleanly — likely hit max-turns. Synthesizing [] (no critic findings)."
                echo '[]' > /tmp/gap-findings.json
              fi
              echo "::endgroup::"
              echo "::group::Gap-finder log"
              [ -f "${LOGS[gap]}" ] && cat "${LOGS[gap]}" || echo "(no output)"
              echo "::endgroup::"
            fi
          fi

          # Export FUNCTIONAL_OK for build-review.sh (it uses it for crash section)
          export FUNCTIONAL_OK
          # Export the variables build-review.sh needs to run the Haiku
          # dedup step (CLAUDE_REVIEW_PIPELINE_DIR for the skill source,
          # SKILLS_DIR as a fallback path, MODEL_FAST for the model arg,
          # BUGBOT_PATH + BUGBOT_BLOCK for accepted-trade-off context).
          export CLAUDE_REVIEW_PIPELINE_DIR
          export SKILLS_DIR
          export MODEL_FAST="${{ inputs.model_fast }}"
          export BUGBOT_BLOCK

          # Merge findings, build review artifacts
          .review-scripts/build-review.sh

      # Stage 3: Post review (pure Bash — dismiss stale, self-dedupe, POST).
      - name: 'Review: post results'
        id: review_poster
        if: always() && steps.claude_run.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.review_identity.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          BOT_USER: ${{ steps.review_identity.outputs.bot_user }}
        run: .review-scripts/post-review.sh

      - name: Verdict gate
        # Skip on cancelled (superseded by new commit) or skipped (upstream failure).
        if: always() && steps.claude_run.outcome != 'cancelled' && steps.claude_run.outcome != 'skipped'
        shell: bash
        env:
          ANALYZER_OUTCOME: ${{ steps.claude_run.outcome }}
          POSTER_OUTCOME: ${{ steps.review_poster.outcome }}
          # Post the "Claude Review — incomplete" crash notification as the
          # same bot identity as the successful reviews. Falls back to
          # GITHUB_TOKEN (github-actions[bot]) when no App is configured.
          GH_TOKEN: ${{ steps.review_identity.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: .review-scripts/verdict-gate.sh

      # Persist round-state for the next follow-up review on this PR.
      # Separate artifact (not bundled with claude-review-${PR_NUMBER}) so
      # the round-2 read step can download just this small file by name
      # without pulling the full review-output payload. Retention 90 days
      # — long enough to cover stale-PR follow-ups without ballooning
      # artifact storage.
      - name: Upload review state
        if: always() && steps.claude_run.outcome == 'success'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: claude-review-state-pr-${{ github.event.pull_request.number || inputs.pr_number }}
          path: /tmp/review-state.json
          if-no-files-found: warn
          retention-days: 90
          overwrite: true

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: claude-review-${{ github.event.pull_request.number || inputs.pr_number }}
          path: |
            review-result.json
            findings.draft.json
            context.md
            test-plan.md
            screenshots/
            /tmp/core-output.txt
            /tmp/sweep-output.txt
            /tmp/spec-output.txt
            /tmp/functional-output.txt
            /tmp/functional-prompt.txt
            /tmp/prd-content.md
            /tmp/core-findings.json
            /tmp/sweep-findings.json
            /tmp/spec-findings.json
            /tmp/functional-findings.json
            /tmp/core-meta.json
            /tmp/functional-meta.json
            /tmp/core-findings-2.json
            /tmp/sweep-findings-2.json
            /tmp/gap-findings.json
            /tmp/core-meta-2.json
            /tmp/core-output-2.txt
            /tmp/sweep-output-2.txt
            /tmp/gap-output.txt
            /tmp/resolution-output.txt
            /tmp/resolution-status.json
            /tmp/resolution-findings.json
            /tmp/*-findings.invalid.json
            /tmp/*-meta.invalid.json
          if-no-files-found: ignore
          retention-days: 7
