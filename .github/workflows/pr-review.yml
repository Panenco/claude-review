name: Claude PR Review

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number (auto-detected from PR event if omitted)'
        required: false
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      CLAUDE_REVIEW_APP_ID:
        required: false
      CLAUDE_REVIEW_APP_PRIVATE_KEY:
        required: false
      CLAUDE_REVIEW_APP_SLUG:
        required: false

concurrency:
  group: claude-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    name: In-Depth Review
    # Skip: fork PRs (no secrets), draft PRs, and PRs labelled 'skip-review'.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       !contains(github.event.pull_request.labels.*.name, 'skip-review'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write  # write needed for uploading screenshots to review-assets branch
      pull-requests: write
      issues: write

    steps:
      - name: Check OAuth token is configured
        shell: bash
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is not configured."
            echo "Run 'claude setup-token' locally against a Claude subscription"
            echo "and add the output as a repo secret named CLAUDE_CODE_OAUTH_TOKEN."
            exit 1
          fi

          # Log a stable fingerprint of the OAuth token so the user can tell
          # which token (and by proxy, which Claude account's quota) is in use.
          # SHA-256 first 12 hex chars: deterministic per token, leaks nothing.
          # When you rotate via `claude setup-token`, this fingerprint changes —
          # cross-check it against the value printed when you last ran setup-token.
          FINGERPRINT=$(printf '%s' "$CLAUDE_CODE_OAUTH_TOKEN" | shasum -a 256 | cut -c1-12)
          echo "Claude OAuth token fingerprint: $FINGERPRINT"
          echo "::notice title=Claude OAuth token::Token fingerprint $FINGERPRINT — if rate-limited, verify this matches the token."

      - name: Resolve PR head SHA
        # On `pull_request` events, github.event.pull_request.head.sha is set.
        # On `workflow_dispatch`, that field is empty and we'd otherwise fall
        # back to github.sha (the SHA of the manually-selected ref, NOT the
        # PR head — checkout would land on the wrong code). We resolve via
        # `gh pr view` to always get the actual PR head, regardless of trigger.
        id: pr_sha
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid,headRepositoryOwner,headRepository)
          SHA=$(jq -r '.headRefOid // empty' <<< "$PR_JSON")
          HEAD_OWNER=$(jq -r '.headRepositoryOwner.login // empty' <<< "$PR_JSON")
          HEAD_NAME=$(jq -r '.headRepository.name // empty' <<< "$PR_JSON")
          HEAD_REPO="$HEAD_OWNER/$HEAD_NAME"

          if [ -z "$SHA" ]; then
            echo "::error::Could not resolve PR head SHA for PR #$PR_NUMBER"
            exit 1
          fi

          # Fork-origin guard. The job-level `if:` catches fork PRs for the
          # `pull_request` event, but `workflow_dispatch` short-circuits that
          # guard (github.event.pull_request is null on dispatch, so the
          # head.repo check never runs). Re-verify here so a maintainer
          # dispatching against a fork-origin PR number can't trick the
          # workflow into checking out fork-controlled code with OAuth +
          # pull-requests:write in the environment.
          if [ "$HEAD_REPO" != "$GITHUB_REPOSITORY" ]; then
            echo "::error::PR #$PR_NUMBER head is in $HEAD_REPO, not $GITHUB_REPOSITORY. Fork PRs are out of scope for the POC."
            exit 1
          fi

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$PR_NUMBER head SHA: $SHA (origin $HEAD_REPO)"

      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.pr_sha.outputs.sha }}
          fetch-depth: 50

      # Fetch review pipeline skills + scripts from the central repo.
      - name: Fetch review pipeline
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: panenco/claude-review
          path: .review-pipeline
          ref: v1
          sparse-checkout: |
            skills
            scripts

      - name: Install review pipeline files
        shell: bash
        run: |
          mkdir -p .claude/skills .github/scripts
          cp .review-pipeline/skills/review-*.md .claude/skills/
          [ -f .review-pipeline/scripts/functional-prompt.template.txt ] && cp .review-pipeline/scripts/functional-prompt.template.txt .github/scripts/
          echo "Installed $(ls .claude/skills/review-*.md | wc -l) review skills"

      # Validate review-config.md sections (warn on missing recommended sections).
      - name: Validate review config
        shell: bash
        run: |
          if [ ! -f .github/review-config.md ]; then
            echo "::warning::No .github/review-config.md found — review will use auto-discovery only. Add one for better results."
            exit 0
          fi
          SECTIONS=0
          grep -q '^## Build preparation' .github/review-config.md && SECTIONS=$((SECTIONS+1)) || echo "::notice::review-config.md missing '## Build preparation' section"
          grep -q '^## Convention files' .github/review-config.md && SECTIONS=$((SECTIONS+1)) || echo "::notice::review-config.md missing '## Convention files' section"
          grep -q '^## Stack-specific review focus' .github/review-config.md && SECTIONS=$((SECTIONS+1)) || echo "::notice::review-config.md missing '## Stack-specific review focus' section"
          grep -q '^## Functional validation' .github/review-config.md && SECTIONS=$((SECTIONS+1)) || echo "::warning::review-config.md missing '## Functional validation' — functional testing will be limited"
          grep -q '^### Auth' .github/review-config.md && SECTIONS=$((SECTIONS+1)) || echo "::warning::review-config.md missing '### Auth' — functional testing will be unauthenticated"
          grep -q '^### Known service ports' .github/review-config.md && SECTIONS=$((SECTIONS+1)) || echo "::warning::review-config.md missing '### Known service ports' — health check will probe common ports"
          echo "review-config.md: $SECTIONS/6 recommended sections present"

      # Skip dependency install for pure documentation PRs.
      - name: Detect code changes
        id: code_check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          FILES=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json files --jq '.files[].path')
          DOCS_ONLY_PATTERN='^(README|CHANGELOG|CONTRIBUTING|CLAUDE|AGENTS|GEMINI)\.md$|^docs/|^LICENSE$'
          NON_DOCS=$(echo "$FILES" | grep -vE "$DOCS_ONLY_PATTERN" || true)
          if [ -n "$NON_DOCS" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "Pure docs PR — skipping build setup."
          fi

      # Detect package manager from lockfile.
      - name: Detect package manager
        id: pkg
        if: steps.code_check.outputs.needs_build == 'true'
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then echo "manager=yarn" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then echo "manager=npm" >> "$GITHUB_OUTPUT"
          else echo "manager=none" >> "$GITHUB_OUTPUT"; fi

      - name: Set up pnpm
        if: steps.pkg.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - name: Set up Node
        if: steps.code_check.outputs.needs_build == 'true' && steps.pkg.outputs.manager != 'none'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.node-version'
          cache: ${{ steps.pkg.outputs.manager }}

      # Soft-fail: degraded review is better than no review.
      - name: Install dependencies
        id: install
        if: steps.code_check.outputs.needs_build == 'true' && steps.pkg.outputs.manager != 'none'
        shell: bash
        env:
          PKG_MANAGER: ${{ steps.pkg.outputs.manager }}
        run: |
          set -euo pipefail
          case "$PKG_MANAGER" in
            pnpm) CMD="pnpm install --frozen-lockfile" ;;
            yarn) CMD="yarn install --frozen-lockfile" ;;
            npm)  CMD="npm ci" ;;
          esac
          if eval "$CMD"; then
            echo "install_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "install_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::$PKG_MANAGER install failed — build verification will be unavailable"
          fi

      # Install Playwright browser for smoke tests (browser-based validation).
      - name: Install Playwright browsers
        if: steps.code_check.outputs.needs_build == 'true' && steps.install.outputs.install_ok == 'true'
        shell: bash
        run: |
          # Auto-discover Playwright directory
          PW_DIR=$(find . -name 'playwright.config.*' -not -path '*/node_modules/*' -not -path '*/.review-pipeline/*' -exec dirname {} \; 2>/dev/null | head -1)
          if [ -z "$PW_DIR" ]; then
            PW_DIR=$(find . -maxdepth 3 -name 'package.json' -not -path '*/node_modules/*' -exec grep -l '"@playwright/test"' {} \; 2>/dev/null | head -1 | xargs dirname 2>/dev/null || true)
          fi
          if [ -n "$PW_DIR" ]; then
            echo "Found Playwright in $PW_DIR"
            cd "$PW_DIR" && npx playwright install chromium --with-deps 2>&1 | tail -5
            echo "Playwright chromium installed"
          else
            echo "No Playwright config found — skipping browser install"
          fi

      # Optional: GitHub App token for a custom review identity.
      # Requires all three secrets: APP_ID + APP_PRIVATE_KEY + APP_SLUG.
      # APP_SLUG is needed because installation tokens can't query /user.
      # Without these, falls back to GITHUB_TOKEN (github-actions[bot]).
      - name: Generate review token
        id: review_token
        shell: bash
        env:
          APP_ID: ${{ secrets.CLAUDE_REVIEW_APP_ID }}
          APP_SLUG: ${{ secrets.CLAUDE_REVIEW_APP_SLUG }}
        run: |
          if [ -n "$APP_ID" ]; then
            if [ -z "$APP_SLUG" ]; then
              echo "::error::CLAUDE_REVIEW_APP_ID is set but CLAUDE_REVIEW_APP_SLUG is not."
              echo "::error::APP_SLUG is required to identify the bot user for review dismissal."
              echo "::error::Find your app slug in the App's settings URL (github.com/apps/<slug>)"
              echo "::error::and add it as a repo secret named CLAUDE_REVIEW_APP_SLUG."
              exit 1
            fi
            echo "has_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App token
        id: app_token
        if: steps.review_token.outputs.has_app == 'true'
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.1.4
        with:
          app-id: ${{ secrets.CLAUDE_REVIEW_APP_ID }}
          private-key: ${{ secrets.CLAUDE_REVIEW_APP_PRIVATE_KEY }}

      - name: Resolve review identity
        id: review_identity
        shell: bash
        env:
          HAS_APP: ${{ steps.review_token.outputs.has_app }}
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
          APP_SLUG: ${{ secrets.CLAUDE_REVIEW_APP_SLUG }}
          FALLBACK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$HAS_APP" = "true" ] && [ -n "$APP_TOKEN" ]; then
            # GitHub Apps post comments authored as "<app-slug>[bot]".
            BOT_USER="${APP_SLUG}[bot]"
            echo "token=$APP_TOKEN" >> "$GITHUB_OUTPUT"
          else
            BOT_USER="github-actions[bot]"
            echo "token=$FALLBACK_TOKEN" >> "$GITHUB_OUTPUT"
          fi
          echo "bot_user=$BOT_USER" >> "$GITHUB_OUTPUT"
          echo "Review identity: $BOT_USER"

      # ── Review pipeline ─────────────────────────────────────────
      # Stage 1: Context Builder (Sonnet) — gathers PR data, runs build,
      #          writes context.md AND test-plan.md (test planning folded in)
      # Stage 2: Parallel — Core (Opus) + Sweep (Sonnet) + Test Runner (Sonnet)
      # Stage 3: Merge + Post (Bash) — deterministic, no LLM
      #
      # All Stage 2 agents run in parallel via background `claude -p`
      # processes, sharing the same context.md + test-plan.md.
      # Core + Sweep read code; Test Runner runs the app.

      # Write build status to a file the context-builder agent can read.
      # This is more reliable than env vars since the agent's Bash calls
      # always have access to filesystem but may not faithfully check env vars.
      - name: Write build status
        shell: bash
        run: |
          BUILD_OK="${{ (steps.code_check.outputs.needs_build == 'true' && steps.install.outputs.install_ok == 'true') && 'true' || 'false' }}"
          echo "{\"build_available\": $BUILD_OK, \"needs_build\": ${{ steps.code_check.outputs.needs_build || 'false' }}}" > /tmp/build-status.json
          echo "Build status: $(cat /tmp/build-status.json)"

      # Deterministic PRD detection — runs BEFORE the context-builder agent so
      # the result is available as a file the agent just reads (no bash interpretation).
      - name: Detect linked PRD
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          PR_TITLE=$(gh pr view "$PR_NUMBER" --json title --jq '.title' | tr '[:upper:]' '[:lower:]')
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body // ""')
          ISSUE_BODY=""
          ISSUE_NUM=$(gh pr view "$PR_NUMBER" --json closingIssuesReferences --jq '.closingIssuesReferences[0]?.number // empty')
          [ -n "$ISSUE_NUM" ] && ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --json body --jq '.body // ""' 2>/dev/null || true)

          PRD_FILES=""
          # 1. Explicit path references in PR/issue body
          for body in "$PR_BODY" "$ISSUE_BODY"; do
            MATCHES=$(echo "$body" | grep -oE 'docs/prds/[a-z0-9_-]+\.md' || true)
            PRD_FILES="$PRD_FILES $MATCHES"
          done
          # 2. Infer from PR title keywords
          PRD_FILES=$(echo "$PRD_FILES" | tr ' ' '\n' | sort -u | grep -v '^$' || true)
          if [ -z "$PRD_FILES" ] && [ -d docs/prds ]; then
            for prd in docs/prds/*.md; do
              BASENAME=$(basename "$prd" .md | sed 's/-prd$//')
              for word in $(echo "$BASENAME" | tr '-' '\n'); do
                [ ${#word} -lt 4 ] && continue
                # Strip trailing 's' for basic stem matching (appointments → appointment)
                STEM=$(echo "$word" | sed 's/s$//')
                if echo "$PR_TITLE" | grep -qi "$STEM" 2>/dev/null; then
                  PRD_FILES="$prd"
                  break 2
                fi
              done
            done
          fi

          if [ -n "$PRD_FILES" ]; then
            echo "PRD detected: $PRD_FILES"
            echo "$PRD_FILES" > /tmp/prd-files.txt
            # Pre-concat PRD content so the agent just reads one file
            echo "# Linked PRD content (auto-detected from PR title)" > /tmp/prd-content.md
            echo "" >> /tmp/prd-content.md
            for pf in $PRD_FILES; do
              echo "## Source: $pf" >> /tmp/prd-content.md
              cat "$pf" >> /tmp/prd-content.md 2>/dev/null || true
              echo "" >> /tmp/prd-content.md
            done
            echo "PRD content: $(wc -l < /tmp/prd-content.md) lines"
          else
            echo "No PRD detected for: $PR_TITLE"
            echo "" > /tmp/prd-files.txt
            echo "" > /tmp/prd-content.md
          fi

      - name: 'Review: build context'
        id: context_builder
        # Don't fail the job if the action returns non-zero (e.g. max-turns).
        # context.md and test-plan.md may have been written in final turns;
        # the next step's `[ ! -f context.md ]` guard catches genuine failures.
        continue-on-error: true
        uses: anthropics/claude-code-action@b47fd721da662d48c5680e154ad16a73ed74d2e0 # v1
        env:
          REVIEW_BOT_USER: ${{ steps.review_identity.outputs.bot_user }}
          REVIEW_BUILD_AVAILABLE: ${{ (steps.code_check.outputs.needs_build == 'true' && steps.install.outputs.install_ok == 'true') && 'true' || 'false' }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.review_identity.outputs.token }}
          prompt: |
            Read .claude/skills/review-context-builder.md and follow it exactly. PR number: ${{ github.event.pull_request.number || inputs.pr_number }}. When done, context.md AND test-plan.md must exist at the repo root. Write both BEFORE running out of turns — partial output beats no output.
          claude_args: |
            --model claude-sonnet-4-6
            --permission-mode dontAsk
            --setting-sources user
            --allowedTools Bash,Read,Glob,Grep,Write
            --disallowedTools Edit,WebFetch,WebSearch
            --max-turns 30
          show_full_output: 'true'

      # Post Turn-4 "Fixed in this revision" replies from the context-builder.
      # The agent writes candidate replies to /tmp/turn4-replies.json but does
      # NOT post them. Only entries whose body starts with "Fixed in this
      # revision." survive this filter — everything else is dropped with a
      # warning. This makes it impossible for the agent to re-post
      # "Still present", "Addressed", etc. even if it disobeys the skill.
      - name: 'Review: post Turn-4 Fixed replies'
        if: always() && steps.context_builder.outcome != 'failure'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.review_identity.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -uo pipefail
          REPLIES_FILE=/tmp/turn4-replies.json
          if [ ! -f "$REPLIES_FILE" ]; then
            echo "No /tmp/turn4-replies.json — context builder skipped Turn 4."
            exit 0
          fi
          if ! jq -e 'type == "array"' "$REPLIES_FILE" > /dev/null 2>&1; then
            echo "::warning::$REPLIES_FILE is not a JSON array — skipping Turn-4 posting"
            exit 0
          fi
          TOTAL=$(jq 'length' "$REPLIES_FILE")
          if [ "$TOTAL" = "0" ]; then
            echo "Turn 4: no fix-reply candidates."
            exit 0
          fi
          POSTED=0
          DROPPED=0
          # shellcheck disable=SC2094  # read from the file we're iterating
          while IFS= read -r entry; do
            PARENT=$(echo "$entry" | jq -r '.parent_id // empty')
            BODY=$(echo "$entry" | jq -r '.body // empty')
            if [ -z "$PARENT" ] || [ -z "$BODY" ]; then
              echo "::warning::Turn-4 entry missing parent_id or body — dropped: $entry"
              DROPPED=$((DROPPED+1))
              continue
            fi
            case "$BODY" in
              "Fixed in this revision."*)
                # Cap body at 400 chars — one-sentence max is the intent.
                SHORT=$(printf '%s' "$BODY" | head -c 400)
                if gh api --method POST "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/comments/$PARENT/replies" -f body="$SHORT" > /dev/null 2>&1; then
                  POSTED=$((POSTED+1))
                  echo "  ✓ posted reply to $PARENT: $SHORT"
                else
                  echo "::warning::Failed to post reply to parent $PARENT"
                fi
                ;;
              *)
                echo "::warning::Dropping Turn-4 reply that does not match 'Fixed in this revision.' template (parent=$PARENT): $BODY"
                DROPPED=$((DROPPED+1))
                ;;
            esac
          done < <(jq -c '.[]' "$REPLIES_FILE")
          echo "Turn-4 replies: posted=$POSTED, dropped=$DROPPED, total=$TOTAL"

      - name: Setup Playwright MCP for test runner
        if: steps.code_check.outputs.needs_build == 'true'
        shell: bash
        run: |
          # Force --output-dir so screenshots land in a known location.
          # Without this, Playwright MCP defaults to os.tmpdir()/playwright-mcp-output/<sessionId>/...
          # which our upload step never finds.
          mkdir -p /tmp/screenshots
          cat > /tmp/mcp-playwright.json << 'MCPEOF'
          {
            "mcpServers": {
              "playwright": {
                "command": "npx",
                "args": ["@playwright/mcp@latest", "--headless", "--output-dir", "/tmp/screenshots"]
              }
            }
          }
          MCPEOF
          sed -i 's/^[[:space:]]*//' /tmp/mcp-playwright.json

      # Pre-start dev environment for functional testing.
      # Reads setup from .github/review-config.md if present, falls back to auto-discovery.
      - name: Pre-start dev environment for test runner
        if: steps.code_check.outputs.needs_build == 'true' && steps.install.outputs.install_ok == 'true'
        id: dev_env
        shell: bash
        env:
          PKG_MANAGER: ${{ steps.pkg.outputs.manager }}
        run: |
          set -uo pipefail
          echo "::group::Pre-start dev environment"

          # Helper: extract bash code blocks from a section of review-config.md
          extract_section_code() {
            local section="$1" file="$2"
            awk -v sec="$section" '
              /^## / || /^### / { in_sec = ($0 ~ sec) }
              in_sec && /^```bash$/ { in_block=1; next }
              in_sec && /^```$/ { in_block=0; next }
              in_block { print }
            ' "$file"
          }

          # Helper: extract service URLs from Known service ports table
          extract_port_url() {
            local service="$1" file="$2"
            awk -v svc="$service" '
              /^\| / && tolower($0) ~ tolower(svc) {
                match($0, /https?:\/\/[^ |]+/)
                if (RSTART > 0) print substr($0, RSTART, RLENGTH)
              }
            ' "$file"
          }

          CONFIG=".github/review-config.md"
          HAS_CONFIG=false
          [ -f "$CONFIG" ] && HAS_CONFIG=true

          # ── Phase 1: Setup (Docker, .env, ORM, etc.) ──
          if [ "$HAS_CONFIG" = "true" ]; then
            # Execute code blocks from ## Functional validation section
            SETUP_CODE=$(extract_section_code "Functional validation" "$CONFIG")
            if [ -n "$SETUP_CODE" ]; then
              echo "Running setup from review-config.md..."
              eval "$SETUP_CODE" || echo "::warning::Some review-config.md setup commands failed"
            else
              echo "No setup code blocks in review-config.md"
            fi
          else
            echo "::notice::No review-config.md — using auto-discovery for dev env"
            # Auto-discovery fallbacks
            if [ -f docker-compose.yml ] || [ -f docker-compose.yaml ] || [ -f compose.yml ] || [ -f compose.yaml ]; then
              echo "Auto: starting Docker services..."
              docker compose up -d 2>&1 || echo "::warning::docker compose failed"
              sleep 10  # generic wait for DB readiness
            fi
            if [ ! -f .env ] && [ -f .env.example ]; then
              cp .env.example .env
              echo "Auto: created .env from .env.example"
            fi
            # Auto-discover Prisma schemas
            for schema in $(find . -name 'schema.prisma' -path '*/prisma/*' -not -path '*/node_modules/*' 2>/dev/null); do
              SCHEMA_DIR=$(dirname "$(dirname "$schema")")
              echo "Auto: found Prisma schema at $schema"
              set -a; [ -f .env ] && source .env; set +a
              (cd "$SCHEMA_DIR" && npx prisma generate 2>&1 && npx prisma migrate deploy 2>&1) || echo "::warning::Prisma setup failed for $schema"
            done
          fi

          # ── Phase 2: Start dev server ──
          echo "Starting dev servers..."
          ${PKG_MANAGER:-npm} run dev > /tmp/dev-server.log 2>&1 &
          echo "dev_pid=$!" >> "$GITHUB_OUTPUT"

          # ── Phase 3: Health checks ──
          API_READY=false
          API_URL=""
          WEB_READY=false
          WEB_URL=""

          if [ "$HAS_CONFIG" = "true" ]; then
            # Read URLs from Known service ports table
            API_URL=$(extract_port_url "API" "$CONFIG")
            WEB_URL=$(extract_port_url "Web" "$CONFIG")
          fi

          # Probe API URL (from config or auto-discover)
          if [ -n "$API_URL" ]; then
            for i in $(seq 1 30); do
              curl -sf "$API_URL" > /dev/null 2>&1 && API_READY=true && break
              sleep 2
            done
          else
            # Auto-probe common API ports
            for port in 3001 4000 8080 8000; do
              for path in /api /health /; do
                if curl -sf "http://localhost:$port$path" > /dev/null 2>&1; then
                  API_URL="http://localhost:$port$path"
                  API_READY=true
                  echo "Auto-discovered API at $API_URL"
                  break 2
                fi
              done
            done
            if [ "$API_READY" = "false" ]; then
              # Wait and retry
              sleep 15
              for port in 3001 4000 8080 8000; do
                for path in /api /health /; do
                  if curl -sf "http://localhost:$port$path" > /dev/null 2>&1; then
                    API_URL="http://localhost:$port$path"
                    API_READY=true
                    echo "Auto-discovered API at $API_URL (after wait)"
                    break 2
                  fi
                done
              done
            fi
          fi

          # Probe Web URL (from config or auto-discover)
          if [ -n "$WEB_URL" ]; then
            for i in $(seq 1 15); do
              curl -sf "$WEB_URL" > /dev/null 2>&1 && WEB_READY=true && break
              sleep 2
            done
          else
            for port in 3000 5173 4200 8080; do
              if curl -sf "http://localhost:$port" > /dev/null 2>&1; then
                WEB_URL="http://localhost:$port"
                WEB_READY=true
                echo "Auto-discovered Web at $WEB_URL"
                break
              fi
            done
          fi

          echo "api_ready=$API_READY" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "web_ready=$WEB_READY" >> "$GITHUB_OUTPUT"
          echo "web_url=$WEB_URL" >> "$GITHUB_OUTPUT"

          # ── Phase 4: Auth (from review-config.md) ──
          AUTH_READY=false
          AUTH_HINT=""
          if [ "$HAS_CONFIG" = "true" ] && [ "$API_READY" = "true" ]; then
            AUTH_CODE=$(extract_section_code "Auth" "$CONFIG")
            if [ -n "$AUTH_CODE" ]; then
              echo "Running auth setup from review-config.md..."
              eval "$AUTH_CODE" && AUTH_READY=true || echo "::warning::Auth setup from config failed"
            fi
          fi
          echo "auth_ready=$AUTH_READY" >> "$GITHUB_OUTPUT"

          if [ "$API_READY" = "true" ]; then
            echo "API ready at $API_URL"
          else
            echo "::warning::API not ready"
            tail -30 /tmp/dev-server.log 2>/dev/null || true
          fi
          echo "Dev env: API=$API_READY ($API_URL), Web=$WEB_READY ($WEB_URL), Auth=$AUTH_READY"
          echo "::endgroup::"

      - name: 'Review: analyze code + test (parallel core + sweep + test runner)'
        id: claude_run
        shell: bash
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.review_identity.outputs.token }}
          # Separate token for writing to the review-assets branch: the custom
          # GitHub App token may lack `contents: write`, but the job's
          # GITHUB_TOKEN always has it (see `permissions:` at job level).
          GITHUB_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          NEEDS_BUILD: ${{ steps.code_check.outputs.needs_build || 'true' }}
          API_READY: ${{ steps.dev_env.outputs.api_ready || 'false' }}
          API_URL: ${{ steps.dev_env.outputs.api_url || '' }}
          WEB_READY: ${{ steps.dev_env.outputs.web_ready || 'false' }}
          WEB_URL: ${{ steps.dev_env.outputs.web_url || '' }}
          AUTH_READY: ${{ steps.dev_env.outputs.auth_ready || 'false' }}
        run: |
          set -euo pipefail

          if [ ! -f context.md ]; then
            echo "::error::context.md not found — context builder failed"
            exit 1
          fi

          echo "::group::Launch parallel reviewers + test runner"
          echo "Starting Core (Opus) + Sweep (Sonnet) + Test Runner (Sonnet) in parallel"

          # Core reviewer: bugs, spec-mismatches, security (Opus)
          ~/.local/bin/claude -p "If bugbot.md exists at the repo root, read it for review standards. Then read .claude/skills/review-core.md and follow it exactly. PR #$PR_NUMBER. context.md is at the repo root." \
            --model claude-opus-4-6 \
            --permission-mode dontAsk \
            --setting-sources user \
            --allowedTools Read,Write \
            --disallowedTools Bash,Edit,Glob,Grep,WebFetch,WebSearch \
            --max-turns 10 > /tmp/core-output.txt 2>&1 &
          PID_CORE=$!

          # Sweep reviewer: consistency, test quality, performance (Sonnet)
          ~/.local/bin/claude -p "If bugbot.md exists at the repo root, read it for review standards. Then read .claude/skills/review-sweep.md and follow it exactly. PR #$PR_NUMBER. context.md is at the repo root." \
            --model claude-sonnet-4-6 \
            --permission-mode dontAsk \
            --setting-sources user \
            --allowedTools Read,Write \
            --disallowedTools Bash,Edit,Glob,Grep,WebFetch,WebSearch \
            --max-turns 8 > /tmp/sweep-output.txt 2>&1 &
          PID_SWEEP=$!

          # Spec-compliance reviewer: PRD vs code comparison (Sonnet)
          # Only runs when a PRD was detected — otherwise no spec to compare against.
          PID_SPEC=""
          if [ -s /tmp/prd-content.md ]; then
            echo "Running spec-compliance reviewer (PRD detected)..."
            ~/.local/bin/claude -p "Read .claude/skills/review-spec-compliance.md and follow it exactly. PR #$PR_NUMBER. context.md is at the repo root. The PRD content is in /tmp/prd-content.md — read it if context.md doesn't include a PRD section." \
              --model claude-sonnet-4-6 \
              --permission-mode dontAsk \
              --allowedTools Read,Write \
              --disallowedTools Bash,Edit,Glob,Grep,WebFetch,WebSearch \
              --max-turns 8 > /tmp/spec-output.txt 2>&1 &
            PID_SPEC=$!
          else
            echo "Spec-compliance reviewer skipped — no PRD detected"
          fi

          # Build the test runner environment hint dynamically from actual results.
          API_URL_VAL="${API_URL:-not discovered}"
          WEB_URL_VAL="${WEB_URL:-not discovered}"
          ENV_HINT="ENVIRONMENT STATUS: "
          if [ "$API_READY" = "true" ]; then
            ENV_HINT+="API is ALREADY RUNNING at $API_URL_VAL. "
          else
            ENV_HINT+="API is NOT running — you may need to start it (check review-config.md or CLAUDE.md). "
          fi
          if [ "$WEB_READY" = "true" ]; then
            ENV_HINT+="Web is ALREADY RUNNING at $WEB_URL_VAL. "
          else
            ENV_HINT+="Web is NOT running — start it if browser tests are needed. "
          fi
          if [ "$AUTH_READY" = "true" ]; then
            ENV_HINT+="Auth cookies are pre-created at /tmp/test-cookies.txt. Use -b /tmp/test-cookies.txt for authenticated curl requests. "
          else
            ENV_HINT+="Auth is NOT pre-configured. Check review-config.md (in context.md) for sign-in endpoint and credentials. If none available, test public endpoints only. "
          fi
          ENV_HINT+="Skip setup steps that are already done."

          # Build AUTH_INSTRUCTIONS for the functional prompt template.
          # Extract auth info from review-config.md to build exact browser_evaluate code.
          AUTH_INSTRUCTIONS="No auth configured. Test only public endpoints. Note auth gaps in uncertain_observations."
          if [ -f .github/review-config.md ] && grep -q '^### Auth' .github/review-config.md; then
            # Extract sign-in URL and credentials from review-config.md
            SIGNIN_LINE=$(grep -i 'sign.in' .github/review-config.md | grep -oE 'POST [^ ]+' | head -1 | sed 's/^POST //' | sed 's/`//g')
            SIGNIN_BODY=$(grep -i 'sign.in' .github/review-config.md | grep -oE '\{[^}]+\}' | head -1)
            if [ -n "$SIGNIN_LINE" ] && [ -n "$SIGNIN_BODY" ]; then
              # Build the browser_evaluate auth code
              FULL_SIGNIN_URL="${API_URL_VAL%/api*}${SIGNIN_LINE}"
              AUTH_INSTRUCTIONS="browser_evaluate with: async () => { const r = await fetch('${FULL_SIGNIN_URL}', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(${SIGNIN_BODY}), credentials:'include'}); return r.status; }"
            fi
          fi

          # Generate functional prompt from template
          FUNC_TEMPLATE=".github/scripts/functional-prompt.template.txt"
          if [ ! -f "$FUNC_TEMPLATE" ]; then
            echo "::warning::No functional-prompt.template.txt found"
          fi

          # Functional tester: single AI agent with Playwright MCP + Bash.
          # Tests through the UI first (Playwright), uses browser_evaluate fetch
          # for authenticated API calls, falls back to curl only when needed.
          PID_FUNCTIONAL=""
          if [ "$NEEDS_BUILD" = "true" ] && [ "$WEB_READY" = "true" ] && [ -f test-plan.md ]; then
            STRATEGY=$(grep -m1 -iE '^## Strategy:' test-plan.md | sed -E 's/.*Strategy:[[:space:]]*//' | tr -d '[:space:]')
            if [ "$STRATEGY" != "skip" ]; then
              echo "Running functional tester (Playwright + Bash) — strategy: ${STRATEGY:-unknown}..."
              mkdir -p /tmp/screenshots
              # Generate prompt from template by replacing placeholders
              if [ -f "$FUNC_TEMPLATE" ]; then
                sed -e "s|{{WEB_URL}}|${WEB_URL_VAL}|g" \
                    -e "s|{{AUTH_INSTRUCTIONS}}|${AUTH_INSTRUCTIONS}|g" \
                    "$FUNC_TEMPLATE" > /tmp/functional-prompt.txt
                # ENV_HINT may contain special chars, append separately
                printf '\n%s\n' "$ENV_HINT" >> /tmp/functional-prompt.txt
              else
                # Fallback: just use ENV_HINT as the prompt
                echo "Read .claude/skills/review-functional-tester.md and follow it. $ENV_HINT" > /tmp/functional-prompt.txt
              fi

              ~/.local/bin/claude -p "$(cat /tmp/functional-prompt.txt)" \
                --model claude-sonnet-4-6 \
                --mcp-config /tmp/mcp-playwright.json \
                --permission-mode dontAsk \
                --allowedTools "Bash,Read,Write,ToolSearch,mcp__playwright__browser_navigate,mcp__playwright__browser_take_screenshot,mcp__playwright__browser_snapshot,mcp__playwright__browser_console_messages,mcp__playwright__browser_click,mcp__playwright__browser_fill_form,mcp__playwright__browser_wait_for,mcp__playwright__browser_close,mcp__playwright__browser_select_option,mcp__playwright__browser_press_key,mcp__playwright__browser_type,mcp__playwright__browser_hover,mcp__playwright__browser_resize,mcp__playwright__browser_tabs,mcp__playwright__browser_navigate_back,mcp__playwright__browser_evaluate" \
                --max-turns 40 > /tmp/functional-output.txt 2>&1 &
              PID_FUNCTIONAL=$!
            else
              echo "Functional tester skipped — strategy: skip"
            fi
          else
            echo "Functional tester skipped (docs-only PR, web not ready, or no test plan)"
          fi

          # Default empty output files so downstream merge always has a valid JSON
          [ -f /tmp/functional-findings.json ] || echo '[]' > /tmp/functional-findings.json
          [ -f /tmp/functional-meta.json ] || echo '{"strategy":"skip","areas_tested":[],"screenshots":[],"overall":"PASS","summary":"Functional testing skipped.","uncertain_observations":[]}' > /tmp/functional-meta.json

          echo "Core PID=$PID_CORE, Sweep PID=$PID_SWEEP, Spec PID=${PID_SPEC:-skipped}, Functional PID=${PID_FUNCTIONAL:-skipped}"

          # Wait for all launched agents to complete
          CORE_OK=0; SWEEP_OK=0; SPEC_OK=0; FUNCTIONAL_OK=0
          wait $PID_CORE && CORE_OK=1 || true
          wait $PID_SWEEP && SWEEP_OK=1 || true
          if [ -n "$PID_SPEC" ]; then
            wait $PID_SPEC && SPEC_OK=1 || true
          else
            SPEC_OK=1  # skipped = OK
          fi
          if [ -n "$PID_FUNCTIONAL" ]; then
            wait $PID_FUNCTIONAL && FUNCTIONAL_OK=1 || true
          else
            FUNCTIONAL_OK=1  # skipped = OK
          fi
          echo "Core: $([ $CORE_OK -eq 1 ] && echo OK || echo FAILED), Sweep: $([ $SWEEP_OK -eq 1 ] && echo OK || echo FAILED), Spec: $([ $SPEC_OK -eq 1 ] && echo OK || echo FAILED), Functional: $([ $FUNCTIONAL_OK -eq 1 ] && echo OK || echo FAILED)"
          echo "::endgroup::"

          # Print each agent's log in its own group for clean readability
          echo "::group::Core reviewer (Opus) log"
          [ -f /tmp/core-output.txt ] && cat /tmp/core-output.txt || echo "(no output)"
          echo "::endgroup::"
          echo "::group::Sweep reviewer (Sonnet) log"
          [ -f /tmp/sweep-output.txt ] && cat /tmp/sweep-output.txt || echo "(no output)"
          echo "::endgroup::"
          echo "::group::Spec-compliance reviewer (Sonnet) log"
          [ -f /tmp/spec-output.txt ] && cat /tmp/spec-output.txt || echo "(skipped or no output)"
          echo "::endgroup::"
          echo "::group::Functional tester (Playwright + Bash) log"
          [ -f /tmp/functional-output.txt ] && cat /tmp/functional-output.txt || echo "(skipped or no output)"
          echo "::endgroup::"

          echo "::group::Merge findings + build review"
          # Guard: if both code reviewers crashed, don't produce a false APPROVE
          CORE_HAS_OUTPUT=false; SWEEP_HAS_OUTPUT=false; SPEC_HAS_OUTPUT=false; FUNCTIONAL_HAS_OUTPUT=false
          [ -f /tmp/core-findings.json ] && CORE_HAS_OUTPUT=true
          [ -f /tmp/sweep-findings.json ] && SWEEP_HAS_OUTPUT=true
          [ -f /tmp/spec-findings.json ] && SPEC_HAS_OUTPUT=true
          [ -f /tmp/functional-findings.json ] && FUNCTIONAL_HAS_OUTPUT=true

          if [ "$CORE_HAS_OUTPUT" = "false" ] && [ "$SWEEP_HAS_OUTPUT" = "false" ]; then
            echo "::error::Both code reviewers failed to produce output — cannot generate a verdict."
            echo "::error::Core exit=$CORE_OK, Sweep exit=$SWEEP_OK. Check rate limits and OAuth token."
            exit 1
          fi

          if [ "$CORE_HAS_OUTPUT" = "false" ]; then
            echo "::warning::Core reviewer (Opus) failed — proceeding with sweep-only findings. Correctness/spec review may be incomplete."
          fi
          if [ "$SWEEP_HAS_OUTPUT" = "false" ]; then
            echo "::warning::Sweep reviewer (Sonnet) failed — proceeding with core-only findings. Consistency/performance review may be incomplete."
          fi
          if [ "$FUNCTIONAL_HAS_OUTPUT" = "false" ]; then
            echo "::warning::Functional tester failed — no functional validation results."
          fi

          # Load functional test metadata (strategy, screenshots, overall verdict)
          FUNCTIONAL_META='{}'
          [ -f /tmp/functional-meta.json ] && FUNCTIONAL_META=$(cat /tmp/functional-meta.json)
          FUNCTIONAL_STRATEGY=$(echo "$FUNCTIONAL_META" | jq -r '.strategy // "skip"')
          FUNCTIONAL_OVERALL=$(echo "$FUNCTIONAL_META" | jq -r '.overall // "N/A"')
          echo "Functional tester: strategy=$FUNCTIONAL_STRATEGY, overall=$FUNCTIONAL_OVERALL"

          # Upload screenshots to repo's review-assets branch for inline embedding.
          # This gives us raw URLs that render in PR comments.
          #
          # Playwright MCP saves screenshots to its CWD when the agent passes a
          # plain filename (e.g. "01-name.png") — that resolves to the repo root
          # in our setup. --output-dir doesn't override agent-chosen paths.
          # So we scan: agent's likely cwd (.), /tmp/screenshots (if agent used
          # an absolute path), and a few historical alternate paths.
          SCREENSHOT_URLS='{}'
          mkdir -p /tmp/all-screenshots
          # maxdepth 2: catches files at repo root (./*.png) plus one level of
          # subdir nesting (./screenshots/*.png), without scanning node_modules.
          for src_dir in . /tmp/screenshots /tmp/playwright-mcp-output .playwright-mcp screenshots .playwright-mcp/screenshots; do
            if [ -d "$src_dir" ]; then
              find "$src_dir" -maxdepth 2 -name '*.png' -not -path '*/node_modules/*' -exec cp -n {} /tmp/all-screenshots/ \; 2>/dev/null || true
            fi
          done
          # Final fallback: scan /tmp recursively for any PNG produced in the last hour.
          if ! ls /tmp/all-screenshots/*.png >/dev/null 2>&1; then
            echo "No screenshots in expected paths — scanning /tmp recursively for recent PNGs..."
            find /tmp -name '*.png' -mmin -60 -not -path '/tmp/all-screenshots/*' -exec cp -n {} /tmp/all-screenshots/ \; 2>/dev/null || true
          fi
          SCREENSHOT_DIR=""
          if ls /tmp/all-screenshots/*.png >/dev/null 2>&1; then
            SCREENSHOT_DIR="/tmp/all-screenshots"
            echo "Found $(ls /tmp/all-screenshots/*.png | wc -l) screenshot(s):"
            ls -la /tmp/all-screenshots/*.png
          else
            echo "No screenshots found in any path. Searched: ., /tmp/screenshots, /tmp/playwright-mcp-output, .playwright-mcp, screenshots, .playwright-mcp/screenshots, plus recursive /tmp scan"
            echo "All recent PNGs anywhere on disk (debug):"
            find / -name '*.png' -mmin -60 2>/dev/null | grep -v node_modules | head -20 || true
          fi

          if [ -n "$SCREENSHOT_DIR" ]; then
            echo "Uploading screenshots to review-assets branch..."
            mkdir -p screenshots
            cp "$SCREENSHOT_DIR"/*.png screenshots/ 2>/dev/null || true

            # Upload via Git Trees API to review-assets branch.
            # Single orphan commit (no parent) with base_tree from previous commit
            # to preserve old PR screenshots. Always exactly 1 commit — no history.
            BASE_TREE=""
            if GH_TOKEN="$GITHUB_REPO_TOKEN" gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/review-assets" >/dev/null 2>&1; then
              BASE_SHA=$(GH_TOKEN="$GITHUB_REPO_TOKEN" gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/review-assets" --jq '.object.sha')
              BASE_TREE=$(GH_TOKEN="$GITHUB_REPO_TOKEN" gh api "repos/$GITHUB_REPOSITORY/git/commits/$BASE_SHA" --jq '.tree.sha')
            fi

            TREE_ENTRIES="[]"
            UPLOAD_COUNT=0
            for img in "$SCREENSHOT_DIR"/*.png; do
              BASENAME=$(basename "$img")
              B64=$(base64 -w0 < "$img" 2>/dev/null || base64 < "$img")
              UPLOAD_PATH="pr-${PR_NUMBER}/${BASENAME}"
              BLOB_SHA=$(GH_TOKEN="$GITHUB_REPO_TOKEN" gh api "repos/$GITHUB_REPOSITORY/git/blobs" \
                --method POST -f content="$B64" -f encoding="base64" --jq '.sha' 2>/dev/null) || true
              if [ -n "$BLOB_SHA" ]; then
                TREE_ENTRIES=$(echo "$TREE_ENTRIES" | jq --arg p "$UPLOAD_PATH" --arg s "$BLOB_SHA" \
                  '. + [{"path": $p, "mode": "100644", "type": "blob", "sha": $s}]')
                URL="https://github.com/$GITHUB_REPOSITORY/raw/review-assets/$UPLOAD_PATH"
                SCREENSHOT_URLS=$(echo "$SCREENSHOT_URLS" | jq --arg k "$BASENAME" --arg v "$URL" '. + {($k): $v}')
                echo "  $BASENAME → $URL"
                UPLOAD_COUNT=$((UPLOAD_COUNT + 1))
              fi
            done

            if [ "$UPLOAD_COUNT" -gt 0 ]; then
              echo "$TREE_ENTRIES" > /tmp/tree-entries.json
              # Use base_tree to preserve existing pr-NNN/ dirs from other PRs
              if [ -n "$BASE_TREE" ]; then
                TREE=$(GH_TOKEN="$GITHUB_REPO_TOKEN" gh api "repos/$GITHUB_REPOSITORY/git/trees" --method POST \
                  --input <(jq -n --arg bt "$BASE_TREE" --slurpfile t /tmp/tree-entries.json '{"base_tree":$bt,"tree":$t[0]}') \
                  --jq '.sha' 2>/dev/null) || true
              else
                TREE=$(GH_TOKEN="$GITHUB_REPO_TOKEN" gh api "repos/$GITHUB_REPOSITORY/git/trees" --method POST \
                  --input <(jq -n --slurpfile t /tmp/tree-entries.json '{"tree":$t[0]}') \
                  --jq '.sha' 2>/dev/null) || true
              fi
              # Orphan commit (no parent) — always 1 commit, force-replaced
              COMMIT=$(GH_TOKEN="$GITHUB_REPO_TOKEN" gh api "repos/$GITHUB_REPOSITORY/git/commits" --method POST \
                -f "message=Review screenshots (auto-replaced)" -f "tree=$TREE" --jq '.sha' 2>/dev/null) || true
              if [ -n "$COMMIT" ]; then
                if [ -n "$BASE_SHA" ]; then
                  GH_TOKEN="$GITHUB_REPO_TOKEN" gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/review-assets" \
                    --method PATCH -f sha="$COMMIT" -F force=true >/dev/null 2>&1
                else
                  GH_TOKEN="$GITHUB_REPO_TOKEN" gh api "repos/$GITHUB_REPOSITORY/git/refs" \
                    --method POST -f ref="refs/heads/review-assets" -f sha="$COMMIT" >/dev/null 2>&1
                fi
                echo "Uploaded $UPLOAD_COUNT screenshots (1 orphan commit, old URLs preserved)"
              fi
            fi
          fi

          # Merge findings from all three sources (core + sweep + functional)
          # Write safe defaults, then overwrite with actual findings if available.
          # Using files + --slurpfile avoids bash variable expansion issues with
          # large JSON payloads that can break --argjson on some runners.
          echo '[]' > /tmp/merged-core.json
          echo '[]' > /tmp/merged-sweep.json
          echo '[]' > /tmp/merged-spec.json
          echo '[]' > /tmp/merged-functional.json
          [ "$CORE_HAS_OUTPUT" = "true" ] && cp /tmp/core-findings.json /tmp/merged-core.json
          [ "$SWEEP_HAS_OUTPUT" = "true" ] && cp /tmp/sweep-findings.json /tmp/merged-sweep.json
          [ "$SPEC_HAS_OUTPUT" = "true" ] && cp /tmp/spec-findings.json /tmp/merged-spec.json
          [ "$FUNCTIONAL_HAS_OUTPUT" = "true" ] && cp /tmp/functional-findings.json /tmp/merged-functional.json
          CORE_META='{}'
          [ -f /tmp/core-meta.json ] && CORE_META=$(cat /tmp/core-meta.json)

          CORE_COUNT=$(jq 'length' /tmp/merged-core.json)
          SWEEP_COUNT=$(jq 'length' /tmp/merged-sweep.json)
          SPEC_COUNT=$(jq 'length' /tmp/merged-spec.json)
          FUNCTIONAL_COUNT=$(jq 'length' /tmp/merged-functional.json)
          echo "Core: $CORE_COUNT, Sweep: $SWEEP_COUNT, Spec: $SPEC_COUNT, Functional: $FUNCTIONAL_COUNT findings"

          # Merge + deduplicate in two passes to prevent posting multiple comments
          # for the same underlying issue:
          #
          #   Pass 1 (line-based): collapse findings at the same path+line_start.
          #     Reviewers often flag the same line under different type labels
          #     (e.g. core: bug, sweep: consistency, functional: spec-mismatch).
          #
          #   Pass 2 (content-based): collapse findings with the same normalized
          #     title in the same file, even when reported on different lines.
          #     A year-only age bug reported at line 10 (handler fn) and line 19
          #     (the actual computation) is ONE issue — keep the highest-severity
          #     instance and drop the rest. Normalization = lowercase + strip
          #     non-alphanumerics, so punctuation/case variance doesn't block
          #     dedup.
          #
          # In both passes, highest severity wins (critical > major > minor > note).
          # Write dedup program to file to avoid YAML/bash quoting issues.
          cat > /tmp/dedup.jq <<'JQEOF'
          def sev_rank:
            if .severity == "critical" then 0
            elif .severity == "major" then 1
            elif .severity == "minor" then 2
            else 3 end;
          def norm_title: (.title // "") | ascii_downcase | gsub("[^a-z0-9]+"; " ") | gsub("^ +| +$"; "");
          def pick_best:
            sort_by(sev_rank) |
            (.[0]) as $best |
            ([.[] | select(.screenshot != null)] | .[0] // null) as $shot_donor |
            if $best.screenshot == null and $shot_donor != null
            then $best + {screenshot: $shot_donor.screenshot}
            else $best end;

          ($c[0] + $s[0] + $p[0] + $f[0])
          | group_by(.path + ":" + (.line_start | tostring))
          | map(pick_best)
          | group_by(.path + "|" + norm_title)
          | map(pick_best)
          JQEOF
          ALL_FINDINGS=$(jq -n \
            --slurpfile c /tmp/merged-core.json \
            --slurpfile s /tmp/merged-sweep.json \
            --slurpfile p /tmp/merged-spec.json \
            --slurpfile f /tmp/merged-functional.json \
            -f /tmp/dedup.jq)
          DEDUPED_COUNT=$(echo "$ALL_FINDINGS" | jq 'length')
          TOTAL=$((CORE_COUNT + SWEEP_COUNT + SPEC_COUNT + FUNCTIONAL_COUNT))
          if [ "$DEDUPED_COUNT" -lt "$TOTAL" ]; then
            echo "Within-run dedup (path+line then path+normalized-title, highest severity wins): $TOTAL → $DEDUPED_COUNT (removed $((TOTAL - DEDUPED_COUNT)))"
          fi

          # Determine verdict from merged findings
          HAS_BLOCKING=$(echo "$ALL_FINDINGS" | jq '[.[] | select(.severity == "critical" or .severity == "major")] | length > 0')
          HAS_ANY=$(echo "$ALL_FINDINGS" | jq 'length > 0')
          HUMAN_REVIEW=$(echo "$CORE_META" | jq -r '.requires_human_review // false')

          if [ "$HAS_BLOCKING" = "true" ]; then
            VERDICT="REQUEST_CHANGES"
          elif [ "$HUMAN_REVIEW" = "true" ]; then
            VERDICT="COMMENT"
          elif [ "$CORE_HAS_OUTPUT" = "false" ]; then
            # Core reviewer (bugs/spec) failed — can't confidently approve without it
            VERDICT="COMMENT"
            echo "::warning::Core reviewer failed — downgrading from APPROVE to COMMENT (cannot verify correctness)"
          elif [ "$HAS_ANY" = "true" ]; then
            VERDICT="COMMENT"
          else
            VERDICT="APPROVE"
          fi

          echo "Verdict: $VERDICT (blocking=$HAS_BLOCKING, any=$HAS_ANY, human=$HUMAN_REVIEW, functional=$FUNCTIONAL_OVERALL)"

          # Build review-result.json
          SPEC_COMPLIANCE=$(echo "$CORE_META" | jq -r '.spec_compliance // ""')
          FUNCTIONAL_SUMMARY_TEXT=$(echo "$FUNCTIONAL_META" | jq -r '.summary // ""')
          if [ "$(echo "$ALL_FINDINGS" | jq 'length')" -eq 0 ]; then
            SUMMARY="${SPEC_COMPLIANCE:-No issues found. Code reviewed for correctness, spec compliance, security, consistency, and performance.}"
          else
            SUMMARY=$(echo "$ALL_FINDINGS" | jq -r '[.[] | "\(.severity): \(.title)"] | join("; ")' | head -c 200)
          fi

          jq -n \
            --arg pr "$PR_NUMBER" \
            --arg verdict "$VERDICT" \
            --arg summary "$SUMMARY" \
            --arg spec_compliance "$SPEC_COMPLIANCE" \
            --argjson findings "$ALL_FINDINGS" \
            --argjson meta "$CORE_META" \
            --argjson functional_meta "$FUNCTIONAL_META" \
            '{
              pr_number: ($pr | tonumber),
              verdict: $verdict,
              summary: $summary,
              spec_compliance: $spec_compliance,
              spec_sources: ($meta.spec_sources // {linked_issue: null, prd_path: null, convention_rules: []}),
              findings: $findings,
              requires_human_review: ($meta.requires_human_review // false),
              requires_human_review_reason: ($meta.requires_human_review_reason // null),
              uncertain_observations: (($meta.uncertain_observations // []) + ($functional_meta.uncertain_observations // [])),
              prompt_injection_detected: ($meta.prompt_injection_detected // false),
              reviewer_self_modification: ($meta.reviewer_self_modification // false),
              build_unavailable: ($meta.build_unavailable // false),
              functional_validation: {
                strategy: ($functional_meta.strategy // "skip"),
                overall: ($functional_meta.overall // "N/A"),
                areas_tested: ($functional_meta.areas_tested // []),
                screenshot_count: (($functional_meta.screenshots // []) | length)
              }
            }' > review-result.json

          # Build /tmp/review-body.md from context.md metadata + findings
          ISSUE=$(jq -r '.spec_sources.linked_issue // "none found"' review-result.json)
          {
            echo "## Claude PR Review — $VERDICT"
            echo ""
            echo "### Spec sources"
            echo ""
            echo "- Linked issue: $([ "$ISSUE" != "null" ] && [ "$ISSUE" != "none found" ] && echo "#$ISSUE" || echo "none found")"
            RULES=$(jq -r '.spec_sources.convention_rules // [] | map("`\(.)`") | join(", ")' review-result.json)
            echo "- Convention rules: ${RULES:-none identified}"
            echo ""
            # Spec compliance summary (gives APPROVE substance, gives REQUEST_CHANGES context)
            if [ -n "$SPEC_COMPLIANCE" ] && [ "$SPEC_COMPLIANCE" != "null" ]; then
              echo "$SPEC_COMPLIANCE"
              echo ""
            elif [ "$VERDICT" = "APPROVE" ]; then
              echo "No issues found. Code reviewed for correctness, spec compliance, security, consistency, test quality, and performance."
              echo ""
            fi
            # Conditional banners
            if [ "$(jq -r '.requires_human_review' review-result.json)" = "true" ]; then
              echo "> 🛑 **Human review required.** $(jq -r '.requires_human_review_reason // ""' review-result.json)"
              echo ""
            fi
            if [ "$(jq -r '.build_unavailable' review-result.json)" = "true" ]; then
              echo "> ⚙️ **Build verification was unavailable.**"
              echo ""
            fi
            if [ "$CORE_HAS_OUTPUT" = "false" ]; then
              echo "> ⚠️ **Core reviewer (Opus) failed** — correctness and spec compliance review may be incomplete."
              echo ""
            fi
            if [ "$SWEEP_HAS_OUTPUT" = "false" ]; then
              echo "> ⚠️ **Sweep reviewer (Sonnet) failed** — consistency and performance review may be incomplete."
              echo ""
            fi
          } > /tmp/review-body.md

          # Append functional validation section — single block from the unified tester
          TEST_PLAN_EXISTS="false"
          [ -f test-plan.md ] && TEST_PLAN_EXISTS="true"

          FUNCTIONAL_SCREENSHOT_COUNT=$(echo "$FUNCTIONAL_META" | jq '(.screenshots // []) | length')
          if [ "$FUNCTIONAL_OVERALL" != "N/A" ] && [ "$FUNCTIONAL_STRATEGY" != "skip" ]; then
            EMOJI="✅"; [ "$FUNCTIONAL_OVERALL" = "FAIL" ] && EMOJI="❌"; [ "$FUNCTIONAL_OVERALL" = "WARN" ] && EMOJI="⚠️"
            {
              echo ""
              echo "<details>"
              echo "<summary>$EMOJI <b>Functional Validation — $FUNCTIONAL_OVERALL</b> ($FUNCTIONAL_SCREENSHOT_COUNT screenshots)</summary>"
              echo ""
              if [ -n "$FUNCTIONAL_SUMMARY_TEXT" ] && [ "$FUNCTIONAL_SUMMARY_TEXT" != "null" ]; then
                echo "#### Summary"
                echo ""
                echo "$FUNCTIONAL_SUMMARY_TEXT"
                echo ""
              fi
              # Findings — one bullet per finding on its own line, with title bold
              # and evidence quoted so long runs don't collapse into a wall of text.
              if [ -f /tmp/functional-findings.json ] && [ "$(jq 'length' /tmp/functional-findings.json)" -gt 0 ]; then
                echo "#### Issues found"
                echo ""
                jq -r '.[] |
                  "- **[\(.severity | ascii_upcase)]** \(.title)\n" +
                  "  <br/>_Evidence:_ " + (.evidence | gsub("\n"; " ") | .[:240]) + (if (.evidence | length) > 240 then "…" else "" end)
                ' /tmp/functional-findings.json
                echo ""
              fi
              # Screenshot gallery — each shot in its own `<details>` block so the
              # gallery reads like a list of clickable thumbnails instead of one
              # scroll-of-death wall. Blank lines between entries are required for
              # GitHub's markdown renderer to treat them as separate blocks.
              if [ "$FUNCTIONAL_SCREENSHOT_COUNT" -gt 0 ]; then
                echo "#### Screenshots"
                echo ""
                echo "$FUNCTIONAL_META" | jq -r --argjson urls "$SCREENSHOT_URLS" \
                  --arg repo "$GITHUB_REPOSITORY" --arg run "${GITHUB_RUN_ID:-}" '
                  .screenshots[] |
                  .file as $file |
                  ($file | split("/") | last) as $basename |
                  ($urls[$basename] // null) as $url |
                  if $url then
                    "<details><summary>\(.description)</summary>\n\n![\(.description)](\($url))\n\n</details>\n"
                  else
                    "- **\(.description)** — *see [build artifacts](https://github.com/\($repo)/actions/runs/\($run))*\n"
                  end
                '
              fi
              echo "</details>"
            } >> /tmp/review-body.md
          elif [ "$FUNCTIONAL_OK" -eq 0 ] && [ "$TEST_PLAN_EXISTS" = "true" ]; then
            # Functional tester crashed (e.g. max-turns) but may have captured
            # screenshots and partial findings before dying. Surface what we have.
            FUNCTIONAL_ERROR=""
            [ -f /tmp/functional-output.txt ] && FUNCTIONAL_ERROR=$(tail -20 /tmp/functional-output.txt | head -c 500)
            CRASH_SHOT_COUNT=$(echo "$SCREENSHOT_URLS" | jq 'length')
            CRASH_FINDING_COUNT=0
            [ -f /tmp/functional-findings.json ] && CRASH_FINDING_COUNT=$(jq 'length' /tmp/functional-findings.json)
            {
              echo ""
              echo "<details>"
              echo "<summary>❌ Functional Validation — CRASHED ($CRASH_SHOT_COUNT screenshots, $CRASH_FINDING_COUNT partial findings)</summary>"
              echo ""
              echo "The functional tester agent did not complete (likely hit its turn budget). Partial evidence below."
              if [ "$CRASH_FINDING_COUNT" -gt 0 ]; then
                echo ""
                echo "**Partial findings:**"
                jq -r '.[] | "- **\(.title)**: \(.evidence[:200])"' /tmp/functional-findings.json
              fi
              if [ "$CRASH_SHOT_COUNT" -gt 0 ]; then
                echo ""
                echo "**Screenshots captured before crash:**"
                echo ""
                echo "$SCREENSHOT_URLS" | jq -r 'to_entries[] | "**\(.key)**\n\n![\(.key)](\(.value))\n"'
              fi
              if [ -n "$FUNCTIONAL_ERROR" ]; then
                echo ""
                echo "**Crash log (tail):**"
                echo ""
                echo '```'
                echo "$FUNCTIONAL_ERROR"
                echo '```'
              fi
              echo "</details>"
            } >> /tmp/review-body.md
          fi

          # Append run logs link
          if [ -n "${GITHUB_RUN_ID:-}" ]; then
            echo "" >> /tmp/review-body.md
            echo "[Run logs](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)" >> /tmp/review-body.md
          fi

          # Build /tmp/review-comments.json — inline comments for findings
          # Include reasoning (the most valuable part for functional findings)
          # and support multi-line comments for findings spanning multiple lines.
          # For test findings with screenshots, embed the image in the comment.
          # Cap multi-line ranges at 10 lines. Larger ranges clutter the PR diff.
          # If the finding spans >10 lines, collapse to a single-line comment on line_end.
          # Write findings and screenshot URLs to files to avoid bash quoting issues
          echo "$ALL_FINDINGS" > /tmp/all-findings.json
          echo "$SCREENSHOT_URLS" > /tmp/screenshot-urls.json
          jq --slurpfile urls /tmp/screenshot-urls.json '[.[] |
            ($urls[0] // {}) as $url_map |
            (.screenshot // null) as $shot |
            (if $shot then ($shot | split("/") | last) else null end) as $basename |
            (if $basename then ($url_map[$basename] // null) else null end) as $shot_url |
            (((.line_end // .line_start // 0) - (.line_start // 0)) <= 10 and .line_start != .line_end) as $use_range |
            {
              path: .path,
              line: (.line_end // .line_start // 1),
              side: "RIGHT",
              body: (
                "**[\((.type // "finding") | ascii_upcase)]** \(.title // "Untitled")\n\n\(.reasoning // "")\n\n_Expected:_ \(.expected // "")"
                + (if .prd_quote then "\n\n_PRD:_ \(.prd_quote)" else "" end)
                + (if $shot_url then "\n\n![screenshot](\($shot_url))" else "" end)
                | if length > 65000 then .[:64997] + "..." else . end
              )
            } + (if $use_range then {start_line: .line_start, start_side: "RIGHT"} else {} end)
          ]' /tmp/all-findings.json > /tmp/review-comments.json

          # Also write findings.draft.json for artifact upload
          cp /tmp/all-findings.json findings.draft.json

          echo "review-result.json: $VERDICT, $(echo "$ALL_FINDINGS" | jq 'length') findings"
          echo "review-comments.json: $(jq 'length' /tmp/review-comments.json) inline comments"
          echo "::endgroup::"

      # Stage 3: Post review (pure Bash — dismiss stale, self-dedupe, POST).
      - name: 'Review: post results'
        id: review_poster
        if: always() && steps.claude_run.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.review_identity.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          BOT_USER: ${{ steps.review_identity.outputs.bot_user }}
        run: |
          set -euo pipefail
          REPO="$GITHUB_REPOSITORY"
          PR="$PR_NUMBER"

          echo "::group::Post review — dismiss stale"
          # Dismiss prior APPROVED and CHANGES_REQUESTED reviews from this bot.
          # Best-effort: a 401 or missing permission must not abort the poster.
          (
            gh api --paginate "repos/$REPO/pulls/$PR/reviews" \
              --jq ".[] | select(.user.login == \"$BOT_USER\" and (.state == \"CHANGES_REQUESTED\" or .state == \"APPROVED\")) | .id" \
              2>/dev/null | while read -r id; do
                  echo "Dismissing review $id"
                  gh api --method PUT "repos/$REPO/pulls/$PR/reviews/$id/dismissals" \
                    -f message="Superseded by new Claude review on updated commit." || true
                done
          ) || echo "::warning::Could not dismiss stale reviews (non-fatal)"
          echo "::endgroup::"

          echo "::group::Post review — dedupe + reply to existing comments"
          # Fetch ALL inline comments. We need `in_reply_to_id` to avoid
          # re-replying on subsequent runs to the same parent comment — without
          # this, cross-bot dedup would post "✅ Confirmed by Claude review..."
          # every time the workflow runs.
          # Only line-anchored comments participate in line-based dedup.
          # File-level comments (aikido's are typically line==null) are covered
          # by the context-builder's Turn-4 reply logic instead.
          if ! gh api --paginate "repos/$REPO/pulls/$PR/comments" \
            --jq "[.[] | select(.line != null) | {id, path, line, user: .user.login, in_reply_to_id, body: .body[:80]}]" \
            2>/dev/null | jq -s 'add // []' > /tmp/all-comments.json; then
            echo "::warning::Could not fetch existing comments — skipping dedup"
            echo '[]' > /tmp/all-comments.json
          fi
          # Top-level (non-reply) comments from other authors — candidates for cross-bot dedup.
          jq --arg bot "$BOT_USER" '[.[] | select(.user != $bot and .in_reply_to_id == null)]' /tmp/all-comments.json > /tmp/other-comments.json
          # Our own comments, incl. replies — used for self-dedup and "already-replied" checks.
          jq --arg bot "$BOT_USER" '[.[] | select(.user == $bot)]' /tmp/all-comments.json > /tmp/own-comments.json
          # Parent IDs we've already replied to in a previous run — dedup cross-bot replies.
          jq --arg bot "$BOT_USER" '[.[] | select(.user == $bot and .in_reply_to_id != null) | .in_reply_to_id]' /tmp/all-comments.json > /tmp/own-reply-parents.json
          echo "Existing inline comments: $(jq 'length' /tmp/all-comments.json) total ($(jq 'length' /tmp/own-comments.json) own, $(jq 'length' /tmp/other-comments.json) other top-level, $(jq 'length' /tmp/own-reply-parents.json) parents we've already replied to)"

          if [ -f /tmp/review-comments.json ]; then
            BEFORE=$(jq 'length' /tmp/review-comments.json)

            # 1. Self-dedup: drop our new comments that duplicate our own previous comments (same path + line ±5).
            #    These are leftovers from dismissed reviews. Don't re-post them — the prior
            #    inline comment persists even after the parent review is dismissed.
            OWN_COUNT=$(jq 'length' /tmp/own-comments.json)
            if [ "$OWN_COUNT" -gt 0 ]; then
              jq --slurpfile own /tmp/own-comments.json '
                [.[] | . as $c |
                  if ($own[0] | any(.path == $c.path and (((.line // -999) - ($c.line // -999)) | fabs) <= 5))
                  then empty else . end
                ]' /tmp/review-comments.json > /tmp/review-comments-selfdedup.json
              SELF_DEDUP=$((BEFORE - $(jq 'length' /tmp/review-comments-selfdedup.json)))
              [ "$SELF_DEDUP" -gt 0 ] && echo "Self-dedup: dropped $SELF_DEDUP comments already posted in prior review"
              mv /tmp/review-comments-selfdedup.json /tmp/review-comments.json
            fi

            # 2. Cross-bot dedup: find new comments that overlap other bots' comments — reply instead of posting new.
            OTHER_COUNT=$(jq 'length' /tmp/other-comments.json)
            if [ "$OTHER_COUNT" -gt 0 ]; then
              AFTER_SELF=$(jq 'length' /tmp/review-comments.json)

              # Match against other bots' top-level comments, BUT skip parents
              # we've already replied to (prevents stacking "✅ Confirmed..."
              # replies every run on the same cursor/aikido comment).
              jq --slurpfile existing /tmp/other-comments.json \
                 --slurpfile replied /tmp/own-reply-parents.json '
                ($replied[0] // []) as $skip |
                [.[] | . as $c |
                  ($existing[0] | map(select(.path == $c.path and (((.line // -999) - ($c.line // -999)) | fabs) <= 5 and (.id as $id | $skip | index($id) | not))) | .[0]) as $match |
                  if $match then {comment_id: $match.id, body: $c.body} else empty end
                ]' /tmp/review-comments.json > /tmp/reply-comments.json

              # Drop new comments only when they overlap an other-bot comment
              # that WE HAVE NOT already replied to. If we've already replied,
              # we don't post another top-level AND we don't reply again —
              # the existing thread (our prior reply + the other bot's comment)
              # already surfaces the issue. Applying $skip here mirrors the
              # reply filter above so findings aren't silently dropped on
              # re-runs. (Flagged by cursor on PR #205.)
              jq --slurpfile existing /tmp/other-comments.json \
                 --slurpfile replied /tmp/own-reply-parents.json '
                ($replied[0] // []) as $skip |
                [.[] | . as $c |
                  if ($existing[0] | any(.path == $c.path and (((.line // -999) - ($c.line // -999)) | fabs) <= 5 and (.id as $id | $skip | index($id) | not)))
                  then empty else . end
                ]' /tmp/review-comments.json > /tmp/review-comments-deduped.json

              AFTER=$(jq 'length' /tmp/review-comments-deduped.json)
              REPLIES=$(jq 'length' /tmp/reply-comments.json)
              echo "Cross-bot dedup: $AFTER_SELF → $AFTER new, $REPLIES will reply to existing"
              mv /tmp/review-comments-deduped.json /tmp/review-comments.json

              # Post replies to other bots' comments we agree with. Keep the
              # reply body short — the parent comment already states the issue.
              # Extract just the finding title (first **[TYPE]** Title line) so
              # the thread reads as a terse acknowledgement, not a wall of text.
              if [ "$REPLIES" -gt 0 ]; then
                jq -c '.[]' /tmp/reply-comments.json | while read -r reply; do
                  CID=$(echo "$reply" | jq -r '.comment_id')
                  TITLE=$(echo "$reply" | jq -r '.body' | head -n 1 | head -c 200)
                  # Extract screenshot URL from body if present (format: ![screenshot](URL))
                  SHOT_URL=$(echo "$reply" | jq -r '.body' | grep -oE '!\[screenshot\]\([^)]+\)' | head -1 || true)
                  REPLY_BODY="✅ Confirmed by Claude review — same finding: $TITLE"
                  [ -n "$SHOT_URL" ] && REPLY_BODY="$REPLY_BODY"$'\n\n'"$SHOT_URL"
                  gh api --method POST "repos/$REPO/pulls/$PR/comments/$CID/replies" \
                    -f body="$REPLY_BODY" 2>/dev/null || true
                done
                echo "Posted $REPLIES reply confirmations"
              fi
            fi

            echo "Final inline comments: $(jq 'length' /tmp/review-comments.json) (from $BEFORE)"
          fi
          echo "::endgroup::"

          echo "::group::Post review — validate comment lines against diff"
          # Filter out comments targeting lines outside PR diff hunks.
          # GitHub returns 422 if any comment has an unresolvable line.
          gh pr diff "$PR" > /tmp/pr.diff 2>/dev/null || true
          if [ -f /tmp/pr.diff ] && [ -f /tmp/review-comments.json ]; then
            # Build a map of valid line ranges per file from diff hunk headers
            # Format: file:start:count per line
            awk '
              /^--- a\// { next }
              /^\+\+\+ b\// { file=substr($0,7) }
              /^@@ / {
                # Parse "+start,count" from hunk header
                match($0, /\+([0-9]+)(,([0-9]+))?/, m)
                start = m[1]+0
                count = m[3]+0
                if (count == 0) count = 1
                for (i = start; i < start + count; i++)
                  print file ":" i
              }
            ' /tmp/pr.diff | sort -u > /tmp/valid-lines.txt

            BEFORE=$(jq 'length' /tmp/review-comments.json)
            jq --rawfile valid /tmp/valid-lines.txt '
              ($valid | split("\n") | map(select(length > 0))) as $lines |
              [.[] | select((.path + ":" + (.line | tostring)) as $key | $lines | any(. == $key))]
            ' /tmp/review-comments.json > /tmp/review-comments-validated.json
            AFTER=$(jq 'length' /tmp/review-comments-validated.json)
            if [ "$AFTER" -lt "$BEFORE" ]; then
              echo "Filtered $((BEFORE - AFTER)) comments with lines outside diff hunks ($BEFORE → $AFTER)"
            fi
            mv /tmp/review-comments-validated.json /tmp/review-comments.json
          fi
          echo "::endgroup::"

          echo "::group::Post review — submit"
          # Validate pre-built files exist
          if [ ! -f /tmp/review-body.md ]; then
            echo "::error::/tmp/review-body.md not found — analyzer didn't build it"
            jq '.posting_error = "review-body.md missing"' review-result.json > /tmp/r.json && mv /tmp/r.json review-result.json
            exit 1
          fi
          if [ ! -f /tmp/review-comments.json ]; then
            echo "No inline comments file — posting body-only review"
            echo '[]' > /tmp/review-comments.json
          fi
          jq -e 'type == "array"' /tmp/review-comments.json > /dev/null || echo '[]' > /tmp/review-comments.json

          # Build and POST atomic review
          VERDICT=$(jq -r '.verdict' review-result.json)
          jq -n \
            --arg event "$VERDICT" \
            --rawfile body /tmp/review-body.md \
            --slurpfile comments /tmp/review-comments.json \
            '{event: $event, body: $body, comments: $comments[0]}' \
            > /tmp/review-payload.json

          echo "Posting $VERDICT review with $(jq '.comments | length' /tmp/review-payload.json) inline comments"
          if ! gh api --method POST "repos/$REPO/pulls/$PR/reviews" --input /tmp/review-payload.json; then
            sleep 2
            if ! gh api --method POST "repos/$REPO/pulls/$PR/reviews" --input /tmp/review-payload.json; then
              jq '.posting_error = "POST failed after 1 retry"' review-result.json > /tmp/r.json && mv /tmp/r.json review-result.json
            fi
          fi
          echo "::endgroup::"

      - name: Verdict gate
        # Skip on cancelled (superseded by new commit) or skipped (upstream failure).
        if: always() && steps.claude_run.outcome != 'cancelled' && steps.claude_run.outcome != 'skipped'
        shell: bash
        env:
          ANALYZER_OUTCOME: ${{ steps.claude_run.outcome }}
          POSTER_OUTCOME: ${{ steps.review_poster.outcome }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # If poster crashed after analyzer succeeded, the review wasn't posted.
          # Inject posting_error so the gate surfaces it.
          if [ "$ANALYZER_OUTCOME" = "success" ] && [ "$POSTER_OUTCOME" != "success" ]; then
            if [ -f review-result.json ]; then
              jq '.posting_error = "poster agent failed (outcome: '"$POSTER_OUTCOME"')"' review-result.json > /tmp/r.json && mv /tmp/r.json review-result.json
              echo "::warning::Poster agent failed — review-result.json exists but the review may not have been posted to the PR."
            fi
          fi

          if [ ! -f review-result.json ]; then
            if [ "$ANALYZER_OUTCOME" = "failure" ]; then
              echo "::error::Analyzer agent crashed before completing the review."
              echo "::error::Check the 'Review: analyze code' step log — common causes:"
              echo "::error::OAuth token expired, network failure, max-turns limit hit, runner OOM."
            else
              echo "::error::review-result.json not found — analyzer did not write output."
            fi

            # Post a visible comment to the PR so the author knows the review
            # didn't happen (Actions log alone is easy to miss).
            PR_NUM="${{ github.event.pull_request.number || inputs.pr_number }}"
            if [ -n "$PR_NUM" ]; then
              CRASH_MSG="> **Claude Review — incomplete** :warning:"
              CRASH_MSG+=$'\n'">"
              CRASH_MSG+=$'\n'"> The automated review agent crashed before producing results."
              CRASH_MSG+=$'\n'"> Common causes: OAuth token expiry, max-turns budget exhausted, runner OOM."
              CRASH_MSG+=$'\n'">"
              CRASH_MSG+=$'\n'"> **Action required:** a human reviewer should check this PR. Re-running the workflow may also help if the cause was transient."
              gh pr comment "$PR_NUM" --body "$CRASH_MSG" || echo "::warning::Failed to post crash notification comment"
            fi
            exit 1
          fi

          if ! jq empty review-result.json 2>/dev/null; then
            echo "::error::review-result.json is not valid JSON"
            exit 1
          fi

          VERDICT=$(jq -r '.verdict // "MISSING"' review-result.json)
          FINDING_COUNT=$(jq '(.findings // []) | length' review-result.json)
          POSTING_ERROR=$(jq -r '.posting_error // empty' review-result.json)
          HUMAN_REVIEW=$(jq -r '.requires_human_review // false' review-result.json)
          HUMAN_REASON=$(jq -r '.requires_human_review_reason // empty' review-result.json)
          BUILD_UNAVAILABLE=$(jq -r '.build_unavailable // false' review-result.json)

          # Step summary for the Actions UI.
          {
            echo "## Claude Review: $VERDICT"
            echo ""
            jq -r '.summary // "(no summary)"' review-result.json
            echo ""
            echo "### Confirmed findings ($FINDING_COUNT)"
            jq -r '(.findings // [])[] | "- **\(.severity | ascii_upcase)** [\(.type)] `\(.path):\(.line_start)` — \(.title)"' review-result.json
            if [ "$HUMAN_REVIEW" = "true" ]; then
              echo ""
              echo "> 🛑 **Human review required.** $HUMAN_REASON"
            fi
            if [ "$BUILD_UNAVAILABLE" = "true" ]; then
              echo ""
              echo "> ⚙️ **Build verification unavailable** — dependency install failed; findings are inferred from source reading without typecheck/lint corroboration."
            fi
            # Functional validation summary
            FN_STRATEGY=$(jq -r '.functional_validation.strategy // "skip"' review-result.json)
            FN_OVERALL=$(jq -r '.functional_validation.overall // "N/A"' review-result.json)
            FN_SHOTS=$(jq -r '.functional_validation.screenshot_count // 0' review-result.json)
            if [ "$FN_STRATEGY" != "skip" ]; then
              echo ""
              echo "### Functional validation: $FN_OVERALL"
              echo "Strategy: $FN_STRATEGY | Screenshots: $FN_SHOTS | Areas: $(jq -r '.functional_validation.areas_tested // [] | join(", ")' review-result.json)"
            fi
            if [ -n "$POSTING_ERROR" ]; then
              echo ""
              echo "> ⚠️ **Posting error:** $POSTING_ERROR. The verdict is recorded above but the GitHub review comment was not posted to this PR."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Surface posting failures as a workflow annotation.
          if [ -n "$POSTING_ERROR" ]; then
            echo "::warning::Claude review posting failed ($POSTING_ERROR) — verdict is $VERDICT but no PR review comment was created."
          fi

          case "$VERDICT" in
            APPROVE)
              exit 0
              ;;
            COMMENT)
              # CI passes (concerns are not blocking) but emit a warning so the
              # check is visually distinguishable from APPROVE in the PR UI.
              if [ "$HUMAN_REVIEW" = "true" ]; then
                echo "::warning::Claude requires human review: $HUMAN_REASON"
              else
                echo "::warning::Claude posted $FINDING_COUNT non-blocking finding(s). See the PR review for details."
              fi
              exit 0
              ;;
            REQUEST_CHANGES)
              exit 1
              ;;
            *)
              echo "::error::Unknown or missing verdict: $VERDICT"
              exit 1
              ;;
          esac

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: claude-review-${{ github.event.pull_request.number || inputs.pr_number }}
          path: |
            review-result.json
            findings.draft.json
            context.md
            test-plan.md
            screenshots/
          if-no-files-found: ignore
          retention-days: 7
