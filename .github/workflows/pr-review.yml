name: Claude PR Review

on:
  workflow_call:
    inputs:
      pr_number:
        description: "PR number (auto-detected from PR event if omitted)"
        type: string
      runner:
        description: "Runner label for BOTH the review and warm-cache jobs. Defaults to GitHub-hosted; set to a self-hosted scale-set label to run reviews on your own fleet. Both jobs must share a fleet: cache keys are scoped by OS+arch, so a hosted warm-cache could never produce an entry an arm64 fleet can restore. Your fleet needs egress to the Actions cache service, else every review runs cold."
        type: string
        default: "ubuntu-latest"
      model_high:
        description: "Deep-reasoning model (Opus judge)."
        type: string
        default: "claude-opus-4-8"
      model_standard:
        description: "Standard-tier model (orchestrator, context builder)."
        type: string
        default: "claude-sonnet-5"
      model_fast:
        description: "Cheap-tier model (Haiku judge)."
        type: string
        default: "claude-haiku-4-5"
      model_functional:
        description: "Model for the functional tester (Playwright MCP + Bash)."
        type: string
        default: "claude-sonnet-5"
      pipeline_ref:
        description: "Ref of panenco/claude-review to install skills/scripts from. Pin to a SHA or branch when testing pipeline changes."
        type: string
        default: "v3"
      dev_env_timeout_seconds:
        description: "How long to wait for the background dev-env (.github/claude-review/dev-start.sh) to come up."
        type: number
        default: 360
      core_max_turns:
        description: "Legacy alias retained for consumer compatibility; has no effect."
        type: number
        default: 40
      functional_budget_seconds:
        description: "Wall-clock budget for the functional tester."
        type: number
        default: 480
      free_disk_space:
        description: "Runner disk to reclaim before dev-env bring-up: safe (default) | aggressive | off."
        type: string
        default: "safe"
      allowed_bots:
        description: "Comma-separated bot logins allowed to trigger the review, or '*' for all bots. Empty (default) skips all bot-initiated runs cleanly."
        type: string
        default: ""
      gate_skip_label:
        description: "Label that forces review_level=skip."
        type: string
        default: "skip-review"
      gate_deep_label:
        description: "Label that forces review_level=full (skip wins if both present)."
        type: string
        default: "deep-review"
      gate_small_ceiling:
        description: "Non-generated changed lines at/under which a runtime PR is `small`."
        type: number
        default: 300
      gate_tiny_ceiling:
        description: "Non-generated changed lines at/under which a runtime PR is `tiny` (single judge, functional skipped)."
        type: number
        default: 10
      gate_size_ceiling:
        description: "Non-generated changed lines over which a PR is `oversized`."
        type: number
        default: 3000
      gate_file_ceiling:
        description: "Changed (non-generated) files over which a PR is `oversized`."
        type: number
        default: 60
      gate_sensitive_globs:
        description: "Space-separated path globs that force a `full` review even when the diff is small. Setting this REPLACES the default list."
        type: string
        default: "*auth.* */oauth/* oauth.* */authentication/* authentication/* */authorization/* authorization/* */security/* security/* */payments/* payments/* */payment/* payment/* */migrations/* migrations/* */migration/* migration/*"
      gate_promotion_bases:
        description: "Space-separated base branches treated as release targets for promotion detection."
        type: string
        default: "main master production prod"
      gate_promotion_heads:
        description: "Space-separated head branches treated as promotion sources."
        type: string
        default: "staging develop dev release hotfix"
      dev_cache_paths:
        description: "Optional, stack-agnostic. Newline-separated filesystem paths to restore BEFORE the dev-env bring-up and warm/save in the warm-cache job, so dev-start.sh compiles/installs against a warm build/dependency cache instead of cold every run. Examples: `~/.gradle/caches/modules-2` + `~/.gradle/wrapper` (Gradle), `~/.m2/repository` (Maven), `~/.cache/go-build` + `~/go/pkg/mod` (Go), `~/.cargo` + `target` (Rust), `~/.cache/pip` (Python). Empty (default) disables it — no cache step runs and behaviour is unchanged. Pair with dev_cache_key_files. The pnpm/npm store is already cached separately, so this is for everything else dev-start.sh builds."
        type: string
        default: ""
      dev_cache_key_files:
        description: "Newline-separated file globs whose contents key the cache. The workflow computes the key itself — `<RUNNER_OS>-<RUNNER_ARCH>-<prefix>-<sha of these files>` — inside the jobs where a checkout + runner exist, so you pass globs (not a pre-hashed key): a reusable-workflow caller's `with:` has no runner/checkout, so `runner`/`hashFiles` can't be used there. Point it at the lockfiles/build descriptors that should rotate the cache, e.g. for Gradle: `backend/java/gradle/libs.versions.toml` + `backend/java/**/*.gradle*` + `backend/java/**/gradle-wrapper.properties`. Globs support `**` (globstar). Required when dev_cache_paths is set; if empty the cache is skipped."
        type: string
        default: ""
      dev_cache_key_prefix:
        description: "Optional cache-key prefix (default 'devcache'). The computed key is `<RUNNER_OS>-<RUNNER_ARCH>-<prefix>-<hash of dev_cache_key_files>`, and restore-keys fall back to `<RUNNER_OS>-<RUNNER_ARCH>-<prefix>-` (so a cold PR prefix-matches the latest main-scope entry; caches are repo-scoped, so a cache your main CI writes under the same prefix is reused too). Set it per stack (e.g. 'gradle') so unrelated caches don't collide. Note the arch scoping: a cache your main CI writes under the same prefix is only reused if that CI runs on the same OS+arch."
        type: string
        default: "devcache"
      dev_cache_warm_command:
        description: "Optional. Shell command the warm-cache job runs (in main scope, against the trusted BASE ref — never PR head) to populate dev_cache_paths, then saves under the computed key. This is what makes the cache available to EVERY PR rather than only re-pushes of the same branch. Keep it cheap and PR-code-free — a dependency resolve/prefetch, not a full build. It runs only on a cache miss (i.e. after the key rotates), so steady-state cost is one prefetch per dependency change. The warm-cache job is a vanilla ubuntu-latest with only Node set up, so the command owns its own toolchain — use the runner's preinstalled versions (e.g. JAVA_HOME_21_X64 / GOROOT_1_22_X64) or install what it needs. Example: 'cd backend/java && JAVA_HOME=$JAVA_HOME_21_X64 ./gradlew :api:dependencies --no-daemon'. Leave empty to skip main-scope warming (the functional job still restores whatever exists under the key/prefix, e.g. a cache your own main CI writes)."
        type: string
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "Single Claude OAuth token. Either this or CLAUDE_CODE_OAUTH_TOKENS is required."
      CLAUDE_CODE_OAUTH_TOKENS:
        description: "Optional newline-separated pool of Claude OAuth tokens; the picker probes each and picks one with remaining quota."
      CLAUDE_REVIEW_APP_CLIENT_ID:
      CLAUDE_REVIEW_APP_PRIVATE_KEY:
      CLAUDE_REVIEW_APP_SLUG:
      TRACKER_SECRETS:
        description: "Optional newline-separated KEY=VALUE pairs exposed to .github/claude-review/fetch-issue.sh."
      DEV_ENV_SECRETS:
        description: "Optional newline-separated KEY=VALUE pairs exposed to .github/claude-review/dev-start.sh."

# Pinned Playwright stack, decoupled from consumer-lockfile churn so the
# browser-binary cache hits every run that doesn't bump these.
env:
  PLAYWRIGHT_VERSION: "1.60.0"
  PLAYWRIGHT_MCP_VERSION: "0.0.75"

jobs:
  review:
    name: In-Depth Review
    if: github.event_name != 'pull_request_target'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 45
    # A push mid-review supersedes the in-flight run: cancel instead of
    # paying for two reviews of which one is already stale.
    concurrency:
      group: claude-review-pr-${{ github.event.pull_request.number || inputs.pr_number }}
      cancel-in-progress: true
    permissions:
      contents: write # screenshot upload to the review-assets branch
      pull-requests: write
      issues: write
      packages: read

    steps:
      # Disallowed bot actors skip cleanly: green check, one ::notice::, no
      # crash banner — a red check on every renovate push trains people to
      # ignore the review.
      - name: Bot-actor gate
        id: actor_gate
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          ALLOWED_BOTS: ${{ inputs.allowed_bots }}
        run: |
          date +%s > /tmp/job-start
          PROCEED=true
          case "$ACTOR" in
            *"[bot]")
              LOGIN="${ACTOR%\[bot\]}"
              PROCEED=false
              if [ "$ALLOWED_BOTS" = "*" ]; then
                PROCEED=true
              else
                IFS=',' read -ra ALLOW <<< "$ALLOWED_BOTS"
                for b in "${ALLOW[@]}"; do
                  b="$(echo "$b" | tr -d '[:space:]')"
                  if [ "$b" = "$LOGIN" ] || [ "$b" = "$ACTOR" ]; then PROCEED=true; fi
                done
              fi
              if [ "$PROCEED" = "false" ]; then
                echo "::notice::Run triggered by bot '$ACTOR', which is not in allowed_bots — skipping the review (no crash banner, no red check). Add '$LOGIN' to the caller's allowed_bots input to review this bot's PRs."
              fi
              ;;
          esac
          echo "proceed=$PROCEED" >> "$GITHUB_OUTPUT"

      # workflow_dispatch's github.sha is NOT the PR head — resolve via API
      # and re-verify the head lives in this repo (fork guard for dispatch).
      - name: Resolve PR head SHA
        id: pr_sha
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid,headRepositoryOwner,headRepository,author)
          SHA=$(jq -r '.headRefOid // empty' <<< "$PR_JSON")
          HEAD_OWNER=$(jq -r '.headRepositoryOwner.login // empty' <<< "$PR_JSON")
          HEAD_NAME=$(jq -r '.headRepository.name // empty' <<< "$PR_JSON")
          HEAD_REPO="$HEAD_OWNER/$HEAD_NAME"

          if [ -z "$SHA" ]; then
            echo "::error::Could not resolve PR head SHA for PR #$PR_NUMBER"
            exit 1
          fi
          if [ "$HEAD_REPO" != "$GITHUB_REPOSITORY" ]; then
            echo "::error::PR #$PR_NUMBER head is in $HEAD_REPO, not $GITHUB_REPOSITORY. Fork PRs are not supported — the PR head must be in the same repository."
            exit 1
          fi

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "author_is_bot=$(jq -r '.author.is_bot // false' <<< "$PR_JSON")" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$PR_NUMBER head SHA: $SHA (origin $HEAD_REPO)"

      # Full clone: round-2 needs `git diff PRIOR_HEAD...HEAD` to always be
      # computable, so since-last scoping never degrades to a full re-review.
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.pr_sha.outputs.sha }}
          fetch-depth: 0

      # DOGFOOD installs from the local checkout; DOWNSTREAM installs at
      # pipeline_ref (a reusable workflow can't observe its own ref).
      - name: Install review pipeline (dogfood — local checkout)
        if: github.repository == 'panenco/claude-review'
        uses: ./

      - name: Checkout review pipeline at pipeline_ref (downstream)
        if: github.repository != 'panenco/claude-review'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: panenco/claude-review
          ref: ${{ inputs.pipeline_ref }}
          path: __claude-review-pipeline

      - name: Install review pipeline (downstream — at pipeline_ref)
        if: github.repository != 'panenco/claude-review'
        uses: ./__claude-review-pipeline

      - name: Detect code changes
        id: code_check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          FILES=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json files --jq '.files[].path')
          DOCS_ONLY_PATTERN='^(README|CHANGELOG|CONTRIBUTING|CLAUDE|AGENTS|GEMINI)\.md$|^docs/|^LICENSE$'
          NON_DOCS=$(echo "$FILES" | grep -vE "$DOCS_ONLY_PATTERN" || true)
          if [ -n "$NON_DOCS" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "Pure docs PR — skipping build setup."
          fi

      # Deterministic resolver: review_level (full|light|skip) + run_functional
      # before any agent runs. Unit-tested in tests/review_plan_test.sh.
      - name: Resolve review plan
        id: review_plan
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          GATE_SKIP_LABEL: ${{ inputs.gate_skip_label }}
          GATE_DEEP_LABEL: ${{ inputs.gate_deep_label }}
          GATE_SMALL_CEILING: ${{ inputs.gate_small_ceiling }}
          GATE_TINY_CEILING: ${{ inputs.gate_tiny_ceiling }}
          GATE_SIZE_CEILING: ${{ inputs.gate_size_ceiling }}
          GATE_FILE_CEILING: ${{ inputs.gate_file_ceiling }}
          GATE_SENSITIVE_GLOBS: ${{ inputs.gate_sensitive_globs }}
          GATE_PROMOTION_BASES: ${{ inputs.gate_promotion_bases }}
          GATE_PROMOTION_HEADS: ${{ inputs.gate_promotion_heads }}
        run: |
          set -uo pipefail
          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json files,baseRefName,headRefName,labels)
          GATE_FILES_TSV=$(jq -r '.files[] | "\(.path)\t\(.additions)\t\(.deletions)"' <<< "$PR_JSON")
          GATE_BASE_REF=$(jq -r '.baseRefName // ""' <<< "$PR_JSON")
          GATE_HEAD_REF=$(jq -r '.headRefName // ""' <<< "$PR_JSON")
          GATE_LABELS=$(jq -r '.labels[].name' <<< "$PR_JSON")
          export GATE_FILES_TSV GATE_BASE_REF GATE_HEAD_REF GATE_LABELS
          PLAN=$(.review-scripts/review-plan.sh)
          echo "Review plan:"; echo "$PLAN" | sed 's/^/  /'
          {
            grep -E '^(review_level|run_functional|gate)=' <<< "$PLAN"
            echo "reason<<__GATE_EOF__"
            grep '^reason=' <<< "$PLAN" | cut -d= -f2-
            echo "__GATE_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: steps.actor_gate.outputs.proceed == 'true' && steps.code_check.outputs.needs_build == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "lts/*"

      - name: Ensure pnpm on PATH
        if: steps.actor_gate.outputs.proceed == 'true' && steps.code_check.outputs.needs_build == 'true'
        shell: bash
        run: |
          if command -v pnpm >/dev/null 2>&1; then
            echo "pnpm already present: $(pnpm --version)"
          elif corepack enable pnpm 2>/dev/null && command -v pnpm >/dev/null 2>&1; then
            echo "pnpm via corepack: $(pnpm --version)"
          else
            npm install -g pnpm
            echo "pnpm via npm: $(pnpm --version)"
          fi

      - name: Cache Playwright assets
        id: pw_cache
        if: steps.actor_gate.outputs.proceed == 'true' && steps.code_check.outputs.needs_build == 'true' && steps.review_plan.outputs.run_functional == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.npm/_npx
          key: ${{ runner.os }}-${{ runner.arch }}-pw-${{ env.PLAYWRIGHT_VERSION }}-mcp-${{ env.PLAYWRIGHT_MCP_VERSION }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pw-

      - name: Install Playwright + MCP
        if: steps.actor_gate.outputs.proceed == 'true' && steps.code_check.outputs.needs_build == 'true' && steps.review_plan.outputs.run_functional == 'true'
        shell: bash
        env:
          PW_CACHE_HIT: ${{ steps.pw_cache.outputs.cache-hit }}
          PW_CACHE_MATCHED_KEY: ${{ steps.pw_cache.outputs.cache-matched-key }}
        run: |
          set -uo pipefail
          mkdir -p /tmp/screenshots
          # `--with-deps` apt-installs system libs, which a non-root ARC container (or
          # one without apt egress) cannot do — failing the job even when chromium is
          # baked into the image. Skip it only when chromium for the pinned version is
          # already on disk AND apt is genuinely unavailable. A partial (restore-keys)
          # hit can carry a stale revision, so that case always installs.
          PW_BROWSERS_DIR="${PLAYWRIGHT_BROWSERS_PATH:-$HOME/.cache/ms-playwright}"
          if compgen -G "${PW_BROWSERS_DIR}/chromium-*" >/dev/null \
            && { [ "${PW_CACHE_HIT:-}" = "true" ] || [ -z "${PW_CACHE_MATCHED_KEY:-}" ]; } \
            && ! sudo -n true 2>/dev/null; then
            echo "Chromium present in ${PW_BROWSERS_DIR} and apt unavailable — skipping 'playwright install --with-deps'."
          else
            npx --yes "playwright@${PLAYWRIGHT_VERSION}" install chromium --with-deps 2>&1 | tail -5
          fi
          # Pre-warm @playwright/mcp so the subagent's stdio spawn doesn't pay
          # a cold install. Non-fatal: a miss only costs ~10-20s at first call.
          if npx --yes -p "@playwright/mcp@${PLAYWRIGHT_MCP_VERSION}" -- node -e 'process.exit(0)' >/dev/null 2>&1; then
            echo "@playwright/mcp@${PLAYWRIGHT_MCP_VERSION} tarball cached for the subagent's spawn path."
          else
            echo "::warning::@playwright/mcp@${PLAYWRIGHT_MCP_VERSION} pre-warm failed — functional tester will cold-install on first call (~10-20s)."
          fi
          echo "Playwright ${PLAYWRIGHT_VERSION} + @playwright/mcp ${PLAYWRIGHT_MCP_VERSION} ready"

      # Optional GitHub App review identity; falls back to github-actions[bot].
      # APP_SLUG is required because installation tokens can't query /user.
      - name: Generate review token
        id: review_token
        shell: bash
        env:
          APP_CLIENT_ID: ${{ secrets.CLAUDE_REVIEW_APP_CLIENT_ID }}
          APP_SLUG: ${{ secrets.CLAUDE_REVIEW_APP_SLUG }}
        run: |
          if [ -n "$APP_CLIENT_ID" ]; then
            if [ -z "$APP_SLUG" ]; then
              echo "::error::CLAUDE_REVIEW_APP_CLIENT_ID is set but CLAUDE_REVIEW_APP_SLUG is not."
              echo "::error::Find your app slug in the App's settings URL (github.com/apps/<slug>) and add it as a repo secret named CLAUDE_REVIEW_APP_SLUG."
              exit 1
            fi
            echo "has_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App token
        id: app_token
        if: steps.review_token.outputs.has_app == 'true'
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.CLAUDE_REVIEW_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAUDE_REVIEW_APP_PRIVATE_KEY }}

      - name: Resolve review identity
        id: review_identity
        shell: bash
        env:
          HAS_APP: ${{ steps.review_token.outputs.has_app }}
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
          APP_SLUG: ${{ secrets.CLAUDE_REVIEW_APP_SLUG }}
          FALLBACK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$HAS_APP" = "true" ] && [ -n "$APP_TOKEN" ]; then
            BOT_USER="${APP_SLUG}[bot]"
            echo "token=$APP_TOKEN" >> "$GITHUB_OUTPUT"
          else
            BOT_USER="github-actions[bot]"
            echo "token=$FALLBACK_TOKEN" >> "$GITHUB_OUTPUT"
          fi
          echo "bot_user=$BOT_USER" >> "$GITHUB_OUTPUT"
          echo "Review identity: $BOT_USER"

      # GitHub is the state store: prior verdict + reviewed SHA come straight
      # from the PR's review list. No cross-run artifacts.
      - name: Derive prior review state
        id: prior_state
        if: steps.actor_gate.outputs.proceed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          REVIEW_BOT_USER: ${{ steps.review_identity.outputs.bot_user }}
          GATE: ${{ steps.review_plan.outputs.gate }}
        run: |
          set -uo pipefail
          gh api --paginate "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" 2>/dev/null \
            | jq -s --arg bot "$REVIEW_BOT_USER" '
                (add // [])
                | [.[] | select(
                    .user.login == $bot
                    and ((.body // "") | length > 0)
                    and ((.body | contains("<!-- claude-review-crash -->")) | not)
                    and ((.body | contains("<!-- claude-review-superseded -->")) | not)
                  )]' > /tmp/prior-reviews.json 2>/dev/null || echo '[]' > /tmp/prior-reviews.json
          jq -e 'type == "array"' /tmp/prior-reviews.json >/dev/null 2>&1 || echo '[]' > /tmp/prior-reviews.json
          COUNT=$(jq 'length' /tmp/prior-reviews.json)
          PRIOR_SHA=$(jq -r 'sort_by(.submitted_at) | last | .commit_id // empty' /tmp/prior-reviews.json)
          PRIOR_STATE=$(jq -r 'sort_by(.submitted_at) | last | .state // empty' /tmp/prior-reviews.json)
          case "$PRIOR_STATE" in
            APPROVED) PRIOR_VERDICT=APPROVE ;;
            CHANGES_REQUESTED) PRIOR_VERDICT=REQUEST_CHANGES ;;
            COMMENTED) PRIOR_VERDICT=COMMENT ;;
            DISMISSED) PRIOR_VERDICT=APPROVE ;; # author opt-out — never re-enforce
            *) PRIOR_VERDICT="" ;;
          esac
          ROUND=$((COUNT + 1))
          if [ -z "$PRIOR_SHA" ] || ! git cat-file -e "${PRIOR_SHA}^{commit}" 2>/dev/null; then
            ROUND=1; PRIOR_SHA=""; PRIOR_VERDICT=""
          fi
          # Oversized dedup: the size gate is a pure function of PR shape, so a
          # push to a still-oversized PR would re-emit a byte-equivalent "split
          # this PR" block. Skip the whole agent run and leave the standing
          # review in place. Keyed on the orchestrator's hidden body marker
          # (same convention as claude-review-crash). Manual dispatch always
          # re-runs — it's the human escape hatch.
          OVERSIZED_DUP=false
          if [ "${GATE:-}" = "oversized" ] && [ "$PRIOR_STATE" = "CHANGES_REQUESTED" ] \
             && [ "${GITHUB_EVENT_NAME:-}" != "workflow_dispatch" ] \
             && jq -e 'sort_by(.submitted_at) | last | (.body // "") | contains("<!-- claude-review-oversized -->")' /tmp/prior-reviews.json >/dev/null 2>&1; then
            OVERSIZED_DUP=true
            echo "::notice::PR is still oversized and the standing Claude review already requests a split — skipping a duplicate review run. The block re-evaluates when the PR shrinks below the ceiling or carries the deep-review label; re-run manually via workflow_dispatch to force a fresh post."
          fi
          echo "oversized_dup=$OVERSIZED_DUP" >> "$GITHUB_OUTPUT"
          printf 'prior_head_sha=%s\nprior_verdict=%s\nround=%s\n' "$PRIOR_SHA" "$PRIOR_VERDICT" "$ROUND" >> "$GITHUB_OUTPUT"
          echo "Round $ROUND (prior verdict: ${PRIOR_VERDICT:-none}, prior head: ${PRIOR_SHA:-none})"

      # After prior_state on purpose: a deduped oversized re-run skips the CLI
      # install and the per-token quota probes entirely. The token picker needs
      # the CLI before claude-code-action installs it; nothing earlier uses either.
      - name: Install Claude CLI (for OAuth token picker)
        if: steps.actor_gate.outputs.proceed == 'true' && steps.prior_state.outputs.oversized_dup != 'true'
        shell: bash
        run: |
          if [ -x "$HOME/.local/bin/claude" ]; then
            echo "Claude CLI already installed: $("$HOME/.local/bin/claude" --version)"
          else
            curl -fsSL https://claude.ai/install.sh | bash
            "$HOME/.local/bin/claude" --version
          fi

      - name: Pick Claude OAuth token
        id: token_picker
        if: steps.actor_gate.outputs.proceed == 'true' && steps.prior_state.outputs.oversized_dup != 'true'
        shell: bash
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKENS: ${{ secrets.CLAUDE_CODE_OAUTH_TOKENS }}
        run: .review-scripts/pick-oauth-token.sh

      # Restore-only on purpose: the all-in-one cache's post(save) step re-runs
      # hashFiles after dev-start.sh mutates the tree, errors, and reds the
      # check. The warm-cache job below is the saver.
      - name: Restore package-manager store
        if: steps.actor_gate.outputs.proceed == 'true' && steps.code_check.outputs.needs_build == 'true' && hashFiles('.github/claude-review/dev-start.sh') != '' && steps.review_plan.outputs.run_functional == 'true'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.npm
          key: ${{ runner.os }}-${{ runner.arch }}-pkg-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pkg-store-

      # A heavy dev-start.sh can ENOSPC the post steps and lose a complete
      # review; reclaim tooling no app bring-up needs.
      - name: Free up runner disk
        if: steps.actor_gate.outputs.proceed == 'true' && steps.code_check.outputs.needs_build == 'true' && hashFiles('.github/claude-review/dev-start.sh') != '' && steps.review_plan.outputs.run_functional == 'true' && inputs.free_disk_space != 'off'
        shell: bash
        env:
          FREE_MODE: ${{ inputs.free_disk_space }}
        run: |
          set -uo pipefail
          echo "Disk before:"; df -h / | tail -1
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/ghc /usr/local/.ghcup /usr/share/swift 2>/dev/null || true
          if [ "${FREE_MODE}" = "aggressive" ]; then
            sudo rm -rf /usr/local/lib/android /usr/share/dotnet 2>/dev/null || true
            docker image prune -af >/dev/null 2>&1 || true
          fi
          echo "Disk after:"; df -h / | tail -1

      # Generic, opt-in dev build/dependency cache (the dev_cache_* inputs).
      # The key is computed HERE (not passed in) because a reusable-workflow
      # caller's `with:` has no runner/checkout, so it can't use runner/hashFiles
      # — this job does. Restore-ONLY here — after disk cleanup, before the
      # bring-up — so dev-start.sh compiles/installs against a warm cache instead
      # of cold every run. The matching warm/save lives in the warm-cache job
      # (main scope), exactly like the package-store: warming there makes the
      # cache available to every PR, not just re-pushes of the same branch.
      # restore (not the all-in-one cache action) so dev-start.sh mutating the
      # tree can't trigger an all-in-one post(save) re-hash that reds the run.
      - name: Compute dev cache key
        id: dev_cache_meta
        if: steps.actor_gate.outputs.proceed == 'true' && steps.code_check.outputs.needs_build == 'true' && hashFiles('.github/claude-review/dev-start.sh') != '' && steps.review_plan.outputs.run_functional == 'true' && inputs.dev_cache_paths != '' && inputs.dev_cache_key_files != ''
        shell: bash
        env:
          KEY_FILES: ${{ inputs.dev_cache_key_files }}
          KEY_PREFIX: ${{ inputs.dev_cache_key_prefix }}
        run: |
          shopt -s globstar nullglob
          files=()
          while IFS= read -r pat; do
            [ -z "$pat" ] && continue
            # shellcheck disable=SC2206  # intentional glob + word-split of the pattern
            for f in $pat; do [ -f "$f" ] && files+=( "$f" ); done
          done <<< "$KEY_FILES"
          if [ ${#files[@]} -eq 0 ]; then
            hash="nofiles"
          else
            hash=$(printf '%s\0' "${files[@]}" | sort -zu | xargs -0 sha256sum | sha256sum | cut -c1-16)
          fi
          echo "key=${RUNNER_OS}-${RUNNER_ARCH}-${KEY_PREFIX}-${hash}" >> "$GITHUB_OUTPUT"
          echo "restore=${RUNNER_OS}-${RUNNER_ARCH}-${KEY_PREFIX}-" >> "$GITHUB_OUTPUT"
      - name: Restore dev build cache
        id: dev_build_cache
        if: steps.actor_gate.outputs.proceed == 'true' && steps.code_check.outputs.needs_build == 'true' && hashFiles('.github/claude-review/dev-start.sh') != '' && steps.review_plan.outputs.run_functional == 'true' && inputs.dev_cache_paths != '' && inputs.dev_cache_key_files != ''
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ inputs.dev_cache_paths }}
          key: ${{ steps.dev_cache_meta.outputs.key }}
          restore-keys: ${{ steps.dev_cache_meta.outputs.restore }}

      # Detached (setsid/nohup/disown) so the bring-up survives the step
      # boundary; the orchestrator polls /tmp/dev-env/rc + outputs.
      - name: Pre-start dev environment (background)
        if: steps.actor_gate.outputs.proceed == 'true' && steps.code_check.outputs.needs_build == 'true' && hashFiles('.github/claude-review/dev-start.sh') != '' && steps.review_plan.outputs.run_functional == 'true'
        id: dev_env_bg
        shell: bash
        env:
          DEV_ENV_SECRETS: ${{ secrets.DEV_ENV_SECRETS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          mkdir -p /tmp/dev-env
          : > /tmp/dev-env/outputs
          : > /tmp/dev-env/log
          rm -f /tmp/dev-env/rc
          setsid nohup bash -c '
            GITHUB_OUTPUT=/tmp/dev-env/outputs .review-scripts/setup-dev-env.sh
            echo $? > /tmp/dev-env/rc
          ' > /tmp/dev-env/log 2>&1 < /dev/null &
          PID=$!
          disown "$PID"
          echo "$PID" > /tmp/dev-env/pid
          echo "Background dev-env launched: PID=$PID (process group leader)"

      # User scope is REQUIRED: claude-code-action's restore-config wipes the
      # workspace .claude/ on PR-head jobs; $HOME survives. The agent file
      # inline-defines mcpServers so Playwright spawns with the subagent.
      - name: Install functional-tester subagent
        if: steps.actor_gate.outputs.proceed == 'true' && steps.prior_state.outputs.oversized_dup != 'true'
        shell: bash
        env:
          MODEL_FUNCTIONAL: ${{ inputs.model_functional }}
        run: |
          mkdir -p "$HOME/.claude/agents"
          envsubst '$MODEL_FUNCTIONAL $PLAYWRIGHT_MCP_VERSION $CLAUDE_REVIEW_PIPELINE_DIR' \
            < "$CLAUDE_REVIEW_PIPELINE_DIR/agents/review-functional-tester.md" \
            > "$HOME/.claude/agents/review-functional-tester.md"
          echo "Installed review-functional-tester subagent (model=$MODEL_FUNCTIONAL)"

      # Single top-level agent; all subagents dispatch via Task inside this
      # one invocation. continue-on-error: a max-turns exit may still have
      # written /tmp/review.json — the poster decides from the artifact.
      - name: "Review: orchestrate"
        id: claude_run
        if: steps.actor_gate.outputs.proceed == 'true' && steps.prior_state.outputs.oversized_dup != 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@ac7e24bf2938964b8ab203e417a2773802392ddd # v1.0.146
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          REVIEW_BOT_USER: ${{ steps.review_identity.outputs.bot_user }}
          PRIOR_HEAD_SHA: ${{ steps.prior_state.outputs.prior_head_sha }}
          PRIOR_VERDICT: ${{ steps.prior_state.outputs.prior_verdict }}
          ROUND: ${{ steps.prior_state.outputs.round }}
          PR_AUTHOR_IS_BOT: ${{ steps.pr_sha.outputs.author_is_bot }}
          DEV_ENV_TIMEOUT_SECONDS: ${{ inputs.dev_env_timeout_seconds }}
          DEV_ENV_SECRETS: ${{ secrets.DEV_ENV_SECRETS }}
          TRACKER_SECRETS: ${{ secrets.TRACKER_SECRETS }}
          # Separate token for the review-assets branch (a custom App token
          # may lack contents: write).
          GITHUB_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL_HIGH: ${{ inputs.model_high }}
          MODEL_STANDARD: ${{ inputs.model_standard }}
          MODEL_FAST: ${{ inputs.model_fast }}
          MODEL_FUNCTIONAL: ${{ inputs.model_functional }}
          FUNCTIONAL_BUDGET_SECONDS: ${{ inputs.functional_budget_seconds }}
          REVIEW_LEVEL: ${{ steps.review_plan.outputs.review_level }}
          RUN_FUNCTIONAL: ${{ steps.review_plan.outputs.run_functional }}
          GATE: ${{ steps.review_plan.outputs.gate }}
          GATE_REASON: ${{ steps.review_plan.outputs.reason }}
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.review_identity.outputs.token }}
          allowed_bots: ${{ inputs.allowed_bots }}
          prompt: |
            Read ${{ env.CLAUDE_REVIEW_PIPELINE_DIR }}/skills/review-orchestrator.md and follow it exactly. PR number: ${{ github.event.pull_request.number || inputs.pr_number }}. You are the single top-level agent for this review. Honor the review plan (REVIEW_LEVEL / RUN_FUNCTIONAL / GATE / GATE_REASON) and the round state (ROUND / PRIOR_HEAD_SHA / PRIOR_VERDICT) passed via env. The functional tester is pre-installed as the custom subagent type `review-functional-tester` — dispatch it via the Task tool; it owns Playwright MCP directly. Your final artifact is /tmp/review.json — ALWAYS write it before exiting, even degraded. Never end a turn with prose only (no tool calls): that terminates the session and crashes the pipeline — every message must contain a tool call until review.json is written.
          claude_args: |
            --model ${{ inputs.model_standard }}
            --permission-mode dontAsk
            --setting-sources user
            --allowedTools Bash,Read,Write,Glob,Grep,Task,ToolSearch,mcp__playwright
            --disallowedTools Edit,WebFetch,WebSearch
            --max-turns 100
          show_full_output: "true"

      # This step's exit code IS the check: green = a review reached the PR
      # (REQUEST_CHANGES included — the blocking signal is the PR review, not
      # the check color), red = pipeline failure.
      - name: Post review + gate
        id: post_review
        if: always() && steps.claude_run.outcome != 'cancelled' && steps.claude_run.outcome != 'skipped'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.review_identity.outputs.token }}
          GITHUB_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          REVIEW_BOT_USER: ${{ steps.review_identity.outputs.bot_user }}
          ANALYZER_OUTCOME: ${{ steps.claude_run.outcome }}
          HEAD_SHA: ${{ steps.pr_sha.outputs.sha }}
          ORCHESTRATOR_EXEC: ${{ steps.claude_run.outputs.execution_file }}
        run: |
          set -uo pipefail
          if [ -n "${ORCHESTRATOR_EXEC:-}" ] && [ -f "$ORCHESTRATOR_EXEC" ]; then
            cp "$ORCHESTRATOR_EXEC" /tmp/orchestrator-output.txt 2>/dev/null || true
          fi
          .review-scripts/post-review.sh

      - name: Report usage
        if: always() && steps.claude_run.outcome != 'cancelled' && steps.claude_run.outcome != 'skipped'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          HEAD_SHA: ${{ steps.pr_sha.outputs.sha }}
          ANALYZER_OUTCOME: ${{ steps.claude_run.outcome }}
          POSTER_OUTCOME: ${{ steps.post_review.outcome }}
          ROUND: ${{ steps.prior_state.outputs.round || '1' }}
        run: |
          set +e
          COST=null; MODELS='[]'; WALL=null; R='{}'
          if [ -f /tmp/orchestrator-output.txt ]; then
            c=$(grep -oE '"total_cost_usd"[[:space:]]*:[[:space:]]*[0-9]+(\.[0-9]+)?' /tmp/orchestrator-output.txt 2>/dev/null \
                  | grep -oE '[0-9]+(\.[0-9]+)?$' | sort -g | tail -1)
            [ -n "$c" ] && COST="$c"
            m=$(grep -oE '"model"[[:space:]]*:[[:space:]]*"claude[^"]*"' /tmp/orchestrator-output.txt 2>/dev/null \
                  | grep -oE 'claude[^"]*' | sort -u | jq -R . | jq -s 'unique' 2>/dev/null)
            echo "$m" | jq -e 'type=="array"' >/dev/null 2>&1 && MODELS="$m"
          fi
          if [ -f /tmp/job-start ]; then
            s=$(cat /tmp/job-start) && WALL=$(( $(date +%s) - s ))
          fi
          [ -f /tmp/review.json ] && jq -e 'type=="object"' /tmp/review.json >/dev/null 2>&1 && R=$(cat /tmp/review.json)
          jq -n \
            --argjson r "$R" --argjson round "$ROUND" --argjson cost "$COST" \
            --argjson models "$MODELS" --argjson wall "$WALL" \
            --arg repo "$GITHUB_REPOSITORY" --arg pr "${PR_NUMBER:-}" \
            --arg run_id "$GITHUB_RUN_ID" --arg attempt "${GITHUB_RUN_ATTEMPT:-1}" \
            --arg head "${HEAD_SHA:-}" --arg analyzer "${ANALYZER_OUTCOME:-}" --arg poster "${POSTER_OUTCOME:-}" \
            '{schema_version: 1, repo: $repo, pr_number: ($pr | tonumber? // null),
              run_id: $run_id, run_attempt: ($attempt | tonumber? // 1), head_sha: $head,
              recorded_at: (now | todate), round: $round,
              verdict: ($r.verdict // null),
              findings_count: (($r.meta.findings // []) | length),
              posting_error: (if $poster == "success" then null else "poster outcome: \($poster)" end),
              requires_human_review: ($r.meta.requires_human_review // false),
              technical_change: ($r.meta.technical_change // false),
              functional_strategy: ($r.meta.functional_validation.strategy // null),
              functional_overall: ($r.meta.functional_validation.overall // null),
              screenshot_count: ($r.meta.functional_validation.screenshot_count // 0),
              analyzer_outcome: $analyzer, poster_outcome: $poster,
              claude_cost_usd: $cost, models: $models,
              phases: (if $wall == null then {} else {total: $wall} end)
            }' > /tmp/usage.json
          echo "Wrote /tmp/usage.json:"; cat /tmp/usage.json
          exit 0

      - name: Upload usage record
        if: always() && steps.claude_run.outcome != 'cancelled' && steps.claude_run.outcome != 'skipped'
        continue-on-error: true
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: claude-review-usage
          path: /tmp/usage.json
          if-no-files-found: ignore
          retention-days: 90
          overwrite: true

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: claude-review-${{ github.event.pull_request.number || inputs.pr_number }}
          path: |
            /tmp/review.json
            context.md
            test-plan.md
            screenshots/
            /tmp/screenshots/
            /tmp/orchestrator-output.txt
            /tmp/judge-*.json
            /tmp/functional-*.json
            /tmp/dev-env/log
          if-no-files-found: ignore
          retention-days: 7

  # pull_request_target writes cache to main scope. PR-code-free: checkout
  # lands on the BASE ref and `pnpm fetch` reads only the lockfile.
  #
  # Runs on `inputs.runner` alongside the review job, and must: cache keys are
  # scoped by OS+arch, so warming on a hosted x64 runner would write entries an
  # arm64 fleet can never restore — every review would run cold. Safe to place on
  # a consumer's fleet precisely because it executes no PR-head code.
  warm-cache:
    if: github.event_name == 'pull_request_target'
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # lookup-only probe: when the store is already warm for this lockfile,
      # skip the whole fetch+save path and land in seconds.
      - name: Check store cache
        id: store_probe
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.npm
          key: ${{ runner.os }}-${{ runner.arch }}-pkg-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          lookup-only: true
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        if: steps.store_probe.outputs.cache-hit != 'true'
        with:
          node-version: "lts/*"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        if: steps.store_probe.outputs.cache-hit != 'true'
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.npm/_npx
          key: ${{ runner.os }}-${{ runner.arch }}-pw-${{ env.PLAYWRIGHT_VERSION }}-mcp-${{ env.PLAYWRIGHT_MCP_VERSION }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pw-
      - if: steps.store_probe.outputs.cache-hit != 'true'
        run: |
          npx --yes "playwright@${PLAYWRIGHT_VERSION}" install chromium --with-deps
          npx --yes -p "@playwright/mcp@${PLAYWRIGHT_MCP_VERSION}" -- node -e 0
      # Restore/save split so a FAILED fetch never saves a poisoned store
      # under the exact lockfile key.
      - name: Restore package-manager store
        id: store_restore
        if: steps.store_probe.outputs.cache-hit != 'true'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.npm
          key: ${{ runner.os }}-${{ runner.arch }}-pkg-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pkg-store-
      - name: Fetch base-lockfile packages into the store
        id: store_fetch
        if: steps.store_probe.outputs.cache-hit != 'true'
        run: |
          echo "fetched=false" >> "$GITHUB_OUTPUT"
          if [ ! -f pnpm-lock.yaml ]; then
            echo "No root pnpm-lock.yaml — store warm skipped."
            exit 0
          fi
          corepack enable 2>/dev/null || true
          command -v pnpm >/dev/null 2>&1 || npm install -g pnpm
          if pnpm fetch; then
            echo "fetched=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::pnpm fetch failed — store warm is best-effort, reviews are unaffected."
          fi
      - name: Save package-manager store
        if: steps.store_probe.outputs.cache-hit != 'true' && steps.store_fetch.outputs.fetched == 'true' && steps.store_restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.npm
          key: ${{ runner.os }}-${{ runner.arch }}-pkg-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}

      # Generic dev build/dependency cache — warmed here in main scope (same as
      # the package store above) so EVERY PR's functional job, which only
      # restores it, starts warm. restore → run the consumer's warm command
      # against the trusted BASE ref → save. Opt-in: the whole block is inert
      # unless dev_cache_paths + dev_cache_key_files + dev_cache_warm_command are
      # set. The warm command runs only on a cache miss (key rotated since the
      # last warm), so steady-state this is a no-op — keeping the aggressive
      # caching short-lived: entries churn only as fast as the key files change,
      # and GitHub idle-evicts unused entries (7 days / 10 GB LRU). The key is
      # computed here (base-ref checkout) the same way the functional job does.
      - name: Compute dev cache key
        id: dev_cache_meta
        if: inputs.dev_cache_paths != '' && inputs.dev_cache_key_files != '' && inputs.dev_cache_warm_command != ''
        shell: bash
        env:
          KEY_FILES: ${{ inputs.dev_cache_key_files }}
          KEY_PREFIX: ${{ inputs.dev_cache_key_prefix }}
        run: |
          shopt -s globstar nullglob
          files=()
          while IFS= read -r pat; do
            [ -z "$pat" ] && continue
            # shellcheck disable=SC2206  # intentional glob + word-split of the pattern
            for f in $pat; do [ -f "$f" ] && files+=( "$f" ); done
          done <<< "$KEY_FILES"
          if [ ${#files[@]} -eq 0 ]; then
            hash="nofiles"
          else
            hash=$(printf '%s\0' "${files[@]}" | sort -zu | xargs -0 sha256sum | sha256sum | cut -c1-16)
          fi
          echo "key=${RUNNER_OS}-${RUNNER_ARCH}-${KEY_PREFIX}-${hash}" >> "$GITHUB_OUTPUT"
          echo "restore=${RUNNER_OS}-${RUNNER_ARCH}-${KEY_PREFIX}-" >> "$GITHUB_OUTPUT"
      - name: Restore dev build cache
        id: dev_cache_restore
        if: inputs.dev_cache_paths != '' && inputs.dev_cache_key_files != '' && inputs.dev_cache_warm_command != ''
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ inputs.dev_cache_paths }}
          key: ${{ steps.dev_cache_meta.outputs.key }}
          restore-keys: ${{ steps.dev_cache_meta.outputs.restore }}
      - name: Warm dev build cache (base ref)
        id: dev_cache_warm
        if: inputs.dev_cache_paths != '' && inputs.dev_cache_key_files != '' && inputs.dev_cache_warm_command != '' && steps.dev_cache_restore.outputs.cache-hit != 'true'
        shell: bash
        env:
          # Caller-supplied (trusted consumer config), passed via env and quoted
          # — never interpolated into the script body.
          DEV_CACHE_WARM_COMMAND: ${{ inputs.dev_cache_warm_command }}
        run: |
          echo "warmed=false" >> "$GITHUB_OUTPUT"
          if bash -lc "$DEV_CACHE_WARM_COMMAND"; then
            echo "warmed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::dev_cache_warm_command failed — cache warm is best-effort, reviews are unaffected."
          fi
      - name: Save dev build cache
        if: inputs.dev_cache_paths != '' && inputs.dev_cache_key_files != '' && steps.dev_cache_warm.outputs.warmed == 'true' && steps.dev_cache_restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ inputs.dev_cache_paths }}
          key: ${{ steps.dev_cache_meta.outputs.key }}
